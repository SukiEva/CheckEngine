<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExecDSL 流程图式设计器（实验版）</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr 360px;
      min-height: 100vh;
      gap: 14px;
      padding: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fafafa;
    }

    .panel-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .panel-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .panel-body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .tool-item {
      border: 1px dashed #bfdbfe;
      background: #eff6ff;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: grab;
      user-select: none;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .tool-item:active { cursor: grabbing; }
    .tool-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.14);
      border-color: #93c5fd;
    }

    .tool-item strong {
      display: block;
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .tool-item span {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .canvas-wrap {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .canvas-toolbar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: #fafafa;
    }

    button {
      border: 1px solid transparent;
      padding: 8px 12px;
      border-radius: 999px;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: .9; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-muted { background: #f3f4f6; color: #374151; }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .btn-primary:hover { box-shadow: 0 8px 16px rgba(37, 99, 235, 0.24); }

    #canvas {
      position: relative;
      overflow: auto;
      background-image:
        linear-gradient(#f3f4f6 1px, transparent 1px),
        linear-gradient(90deg, #f3f4f6 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: calc(100vh - 170px);
    }

    #dropZone {
      position: relative;
      width: 2200px;
      height: 1400px;
    }
    #linkLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }
    .flow-link {
      fill: none;
      stroke: #93c5fd;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .flow-node {
      position: absolute;
      width: 220px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      cursor: grab;
      transition: box-shadow .15s ease, border-color .15s ease;
    }

    .flow-node:active { cursor: grabbing; }
    .flow-node:hover { box-shadow: 0 10px 26px rgba(15, 23, 42, 0.14); }

    .flow-node.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .flow-node .node-head {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 0.82rem;
      display: flex;
      justify-content: space-between;
      color: #1d4ed8;
      background: #eff6ff;
      border-radius: 12px 12px 0 0;
      font-weight: 700;
    }

    .flow-node .node-body {
      padding: 10px;
      display: grid;
      gap: 6px;
      font-size: 0.84rem;
    }

    .muted { color: var(--muted); }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
      font-size: 0.86rem;
      resize: vertical;
      min-height: 38px;
    }

    .field textarea { min-height: 90px; line-height: 1.5; }
    .field-note {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.5;
    }

    .field-autocomplete { position: relative; }
    .autocomplete-panel {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% - 4px);
      z-index: 12;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.12);
      padding: 8px;
      gap: 6px;
      max-height: 180px;
      overflow: auto;
    }
    .autocomplete-panel.show { display: grid; }
    .autocomplete-item {
      border: 1px solid #dbeafe;
      background: #f8fbff;
      color: #1e3a8a;
      border-radius: 8px;
      text-align: left;
      padding: 6px 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: #dbeafe;
      border-color: #93c5fd;
    }
    .autocomplete-waiting {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 4px 2px;
    }

    pre {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.78rem;
      line-height: 1.5;
      max-height: 42vh;
      overflow: auto;
    }

    .status {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0 14px 12px;
    }

    .status strong { color: var(--success); }
    .status-warn strong { color: #b45309; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="panel-head">
        <h2 class="panel-title">节点工具箱</h2>
        <div class="panel-sub">把节点拖到中间画布，再点击节点进行编辑。</div>
      </div>
      <div class="panel-body" id="toolbox"></div>
    </aside>

    <main class="panel canvas-wrap">
      <div class="canvas-toolbar">
        <button class="btn-primary" id="btnReset">清空画布</button>
        <button class="btn-muted" id="btnArrange">自动纵向排布</button>
        <button class="btn-muted" id="btnImport">导入 JSON</button>
        <button class="btn-muted" id="btnPreview">预览 JSON</button>
        <button class="btn-muted" id="btnExport">下载 JSON</button>
        <input type="file" id="fileImportJson" accept="application/json" style="display:none;" />
      </div>
      <section id="canvas">
        <div id="dropZone"></div>
      </section>
      <div class="status" id="statusText">提示：拖拽左侧节点到画布后点击编辑。</div>
    </main>

    <aside class="panel">
      <div class="panel-head">
        <h2 class="panel-title">节点编辑 + DSL 预览</h2>
        <div class="panel-sub">编辑仅针对当前选中的节点；可通过上方“预览 JSON”查看完整 DSL。</div>
      </div>
      <div class="panel-body" id="editorPanel">
        <div class="muted">请先在画布中选择一个节点。</div>
      </div>
    </aside>
  </div>

  <dialog id="jsonPreviewDialog" style="width:min(920px,92vw); border:1px solid #e5e7eb; border-radius:14px; padding:0; box-shadow:0 24px 48px rgba(15, 23, 42, .2);">
    <div style="padding:12px 14px; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center;">
      <strong style="font-size:0.95rem;">ExecDSL JSON 预览</strong>
      <button class="btn-muted" id="btnClosePreview" style="padding:6px 10px;">关闭</button>
    </div>
    <div style="padding:12px;">
      <pre id="dslPreview" style="max-height:60vh;"></pre>
    </div>
  </dialog>

  <script>
    const NODE_DEFS = [
      { type: 'context', label: 'Context 节点', hint: '用于填充 $context', defaultTitle: '加载上下文', sqlRole: true },
      { type: 'variable', label: 'Variable 节点', hint: '用于 variables.assign_by_condition', defaultTitle: '计算变量', decisionRole: true },
      { type: 'precheck', label: 'Precheck 节点', hint: '前置校验，失败短路', defaultTitle: '前置检查', sqlRole: true },
      { type: 'step', label: 'Step 节点', hint: '正式执行步骤，支持 consumes', defaultTitle: '执行步骤', sqlRole: true },
      { type: 'on_fail', label: 'On Fail 节点', hint: '顶层失败判定与消息', defaultTitle: '最终失败判定', decisionRole: true },
    ];

    const toolbox = document.getElementById('toolbox');
    const dropZone = document.getElementById('dropZone');
    const editorPanel = document.getElementById('editorPanel');
    const dslPreview = document.getElementById('dslPreview');
    const jsonPreviewDialog = document.getElementById('jsonPreviewDialog');
    const statusText = document.getElementById('statusText');

    const state = {
      nodes: [],
      selectedId: null,
      dragNodeId: null,
      dragOffsetX: 0,
      dragOffsetY: 0,
    };

    function makeNode(def, x, y) {
      return {
        id: makeNodeId(),
        type: def.type,
        title: def.defaultTitle,
        x,
        y,
        sql: 'SELECT 1 AS ok;',
        decision: 'exists',
        outputs: 'ok',
        consumes: '',
        note: '',
        stepOrder: def.type === 'step' ? getNextStepOrder() : null,
      };
    }

    function makeNodeId() {
      return `node_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`;
    }

    function renderToolbox() {
      toolbox.innerHTML = '';
      NODE_DEFS.forEach((def) => {
        const card = document.createElement('div');
        card.className = 'tool-item';
        card.draggable = true;
        card.dataset.nodeType = def.type;
        card.innerHTML = `<strong>${def.label}</strong><span>${def.hint}</span>`;
        card.addEventListener('dragstart', (event) => {
          event.dataTransfer.setData('node-type', def.type);
        });
        toolbox.appendChild(card);
      });
    }

    function renderCanvas() {
      dropZone.innerHTML = '';
      const linkLayer = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      linkLayer.setAttribute('id', 'linkLayer');
      linkLayer.setAttribute('viewBox', '0 0 2200 1400');
      linkLayer.innerHTML = `
        <defs>
          <marker id="flowArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 z" fill="#93c5fd"></path>
          </marker>
        </defs>
      `;
      dropZone.appendChild(linkLayer);
      state.nodes.forEach((node) => {
        const el = document.createElement('article');
        el.className = `flow-node${state.selectedId === node.id ? ' selected' : ''}`;
        el.style.left = `${node.x}px`;
        el.style.top = `${node.y}px`;
        el.dataset.nodeId = node.id;
        el.innerHTML = `
          <div class="node-head">
            <span>${node.type}</span>
            <span>${node.type === 'step' && node.stepOrder ? `S${node.stepOrder}` : `#${node.id.slice(-4)}`}</span>
          </div>
          <div class="node-body">
            <strong>${escapeHtml(node.title || '(未命名节点)')}</strong>
            <div class="muted">outputs: ${escapeHtml(node.outputs || '无')}</div>
          </div>
        `;

        el.addEventListener('mousedown', (event) => {
          if (event.button !== 0) return;
          state.dragNodeId = node.id;
          state.dragOffsetX = event.offsetX;
          state.dragOffsetY = event.offsetY;
          selectNode(node.id);
        });

        el.addEventListener('click', () => selectNode(node.id));
        dropZone.appendChild(el);
      });
      renderLinks(linkLayer);
    }

    function selectNode(nodeId) {
      state.selectedId = nodeId;
      renderCanvas();
      renderEditor();
    }

    function renderEditor() {
      const node = state.nodes.find((item) => item.id === state.selectedId);
      if (!node) {
        editorPanel.innerHTML = '<div class="muted">请先在画布中选择一个节点。</div>';
        return;
      }

      editorPanel.innerHTML = `
        <div class="field">
          <label>节点标题</label>
          <input id="f_title" value="${escapeAttr(node.title)}" />
        </div>
        <div class="field">
          <label>类型（只读）</label>
          <input value="${node.type}" disabled />
        </div>
        ${node.type === 'step' ? `
        <div class="field">
          <label>Step 顺序</label>
          <input value="${node.stepOrder || '-'}" disabled />
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn-muted" id="btnStepUp">上移</button>
            <button class="btn-muted" id="btnStepDown">下移</button>
          </div>
        </div>
        ` : ''}
        <div class="field field-autocomplete">
          <label>SQL</label>
          <textarea id="f_sql">${escapeHtml(node.sql)}</textarea>
          <div class="field-note">输入 <code>$</code> 可联想运行时变量路径（例如 <code>$steps.xx.yy</code>）。</div>
          <div class="autocomplete-panel" id="ac_sql"></div>
        </div>
        <div class="field">
          <label>Decision（用于 precheck/on_fail/variable）</label>
          <select id="f_decision">
            <option value="exists" ${node.decision === 'exists' ? 'selected' : ''}>exists</option>
            <option value="eq" ${node.decision === 'eq' ? 'selected' : ''}>eq</option>
            <option value="gt" ${node.decision === 'gt' ? 'selected' : ''}>gt</option>
            <option value="custom" ${node.decision === 'custom' ? 'selected' : ''}>custom</option>
          </select>
        </div>
        <div class="field">
          <label>Outputs（逗号分隔）</label>
          <input id="f_outputs" value="${escapeAttr(node.outputs)}" />
        </div>
        <div class="field field-autocomplete">
          <label>Consumes（逗号分隔 step id）</label>
          <input id="f_consumes" value="${escapeAttr(node.consumes)}" />
          <div class="field-note">输入时会联想已有 step 节点 ID。</div>
          <div class="autocomplete-panel" id="ac_consumes"></div>
        </div>
        <div class="field">
          <label>备注</label>
          <textarea id="f_note">${escapeHtml(node.note)}</textarea>
        </div>
        <div style="display:flex; gap:8px; flex-wrap: wrap;">
          <button class="btn-primary" id="btnSaveNode">保存节点</button>
          <button class="btn-danger" id="btnDeleteNode">删除节点</button>
        </div>
      `;

      document.getElementById('btnSaveNode').addEventListener('click', () => {
        node.title = document.getElementById('f_title').value.trim();
        node.sql = document.getElementById('f_sql').value;
        node.decision = document.getElementById('f_decision').value;
        node.outputs = document.getElementById('f_outputs').value.trim();
        node.consumes = document.getElementById('f_consumes').value.trim();
        node.note = document.getElementById('f_note').value;
        renderCanvas();
        saveLocal();
        statusText.innerHTML = `<strong>已保存：</strong>${escapeHtml(node.title || node.id)}`;
      });

      document.getElementById('btnDeleteNode').addEventListener('click', () => {
        state.nodes = state.nodes.filter((item) => item.id !== node.id);
        state.selectedId = null;
        renderCanvas();
        renderEditor();
        saveLocal();
        statusText.innerHTML = '已删除节点。';
      });

      if (node.type === 'step') {
        document.getElementById('btnStepUp').addEventListener('click', () => {
          moveStepOrder(node.id, -1);
        });
        document.getElementById('btnStepDown').addEventListener('click', () => {
          moveStepOrder(node.id, 1);
        });
      }

      bindAutocompletes(node);
    }

    function getNextStepOrder() {
      const stepOrders = state.nodes
        .filter((item) => item.type === 'step' && Number.isFinite(item.stepOrder))
        .map((item) => item.stepOrder);
      if (!stepOrders.length) return 1;
      return Math.max(...stepOrders) + 1;
    }

    function getSortedSteps() {
      return state.nodes
        .filter((item) => item.type === 'step')
        .sort((left, right) => (left.stepOrder || 0) - (right.stepOrder || 0));
    }

    function moveStepOrder(nodeId, offset) {
      const steps = getSortedSteps();
      const currentIndex = steps.findIndex((item) => item.id === nodeId);
      if (currentIndex < 0) return;
      const targetIndex = currentIndex + offset;
      if (targetIndex < 0 || targetIndex >= steps.length) return;
      const currentStep = steps[currentIndex];
      const targetStep = steps[targetIndex];
      const temp = currentStep.stepOrder;
      currentStep.stepOrder = targetStep.stepOrder;
      targetStep.stepOrder = temp;
      renderCanvas();
      renderEditor();
      saveLocal();
      statusText.classList.remove('status-warn');
      statusText.innerHTML = `<strong>已调整 Step 顺序：</strong>${escapeHtml(currentStep.title || currentStep.id)}`;
    }

    function getOrderedFlowNodes() {
      const order = [];
      const pushByType = (type) => {
        state.nodes
          .filter((item) => item.type === type)
          .forEach((item) => order.push(item));
      };
      pushByType('context');
      pushByType('variable');
      pushByType('precheck');
      getSortedSteps().forEach((stepNode) => order.push(stepNode));
      pushByType('on_fail');
      return order;
    }

    function renderLinks(linkLayer) {
      const orderedNodes = getOrderedFlowNodes();
      for (let index = 0; index < orderedNodes.length - 1; index += 1) {
        const fromNode = orderedNodes[index];
        const toNode = orderedNodes[index + 1];
        const startX = fromNode.x + 220;
        const startY = fromNode.y + 54;
        const endX = toNode.x;
        const endY = toNode.y + 54;
        const midX = startX + (endX - startX) * 0.5;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('class', 'flow-link');
        path.setAttribute('marker-end', 'url(#flowArrow)');
        path.setAttribute('d', `M ${startX} ${startY} C ${midX} ${startY}, ${midX} ${endY}, ${endX} ${endY}`);
        linkLayer.appendChild(path);
      }
    }

    function bindAutocompletes(node) {
      const sqlTextarea = document.getElementById('f_sql');
      const sqlPanel = document.getElementById('ac_sql');
      const consumesInput = document.getElementById('f_consumes');
      const consumesPanel = document.getElementById('ac_consumes');

      createAutocomplete({
        inputEl: sqlTextarea,
        panelEl: sqlPanel,
        getKeyword: () => {
          const cursor = sqlTextarea.selectionStart || 0;
          const beforeCursor = sqlTextarea.value.slice(0, cursor);
          const matched = beforeCursor.match(/[$][a-zA-Z0-9_\\.]*$/);
          return matched ? matched[0] : '';
        },
        buildOptions: (keyword) => {
          const suggestionPool = getRuntimePathSuggestions(node);
          if (!keyword) return [];
          return suggestionPool.filter((item) => item.toLowerCase().includes(keyword.toLowerCase()));
        },
        applySuggestion: (value) => {
          const cursor = sqlTextarea.selectionStart || 0;
          const beforeCursor = sqlTextarea.value.slice(0, cursor);
          const afterCursor = sqlTextarea.value.slice(cursor);
          const matched = beforeCursor.match(/[$][a-zA-Z0-9_\\.]*$/);
          if (!matched) return;
          const start = cursor - matched[0].length;
          sqlTextarea.value = `${beforeCursor.slice(0, start)}${value}${afterCursor}`;
          const nextCursor = start + value.length;
          sqlTextarea.selectionStart = nextCursor;
          sqlTextarea.selectionEnd = nextCursor;
          sqlTextarea.focus();
        },
      });

      createAutocomplete({
        inputEl: consumesInput,
        panelEl: consumesPanel,
        getKeyword: () => {
          const cursor = consumesInput.selectionStart || 0;
          const beforeCursor = consumesInput.value.slice(0, cursor);
          const token = beforeCursor.split(',').pop() || '';
          return token.trim();
        },
        buildOptions: (keyword) => {
          const stepIds = getStepIdSuggestions(node.id);
          return stepIds.filter((item) => item.toLowerCase().includes(keyword.toLowerCase()));
        },
        applySuggestion: (value) => {
          const cursor = consumesInput.selectionStart || 0;
          const beforeCursor = consumesInput.value.slice(0, cursor);
          const afterCursor = consumesInput.value.slice(cursor);
          const parts = beforeCursor.split(',');
          parts[parts.length - 1] = ` ${value}`;
          const nextBefore = parts.join(',').replace(/^ /, '');
          consumesInput.value = `${nextBefore}${afterCursor}`;
          const nextCursor = nextBefore.length;
          consumesInput.selectionStart = nextCursor;
          consumesInput.selectionEnd = nextCursor;
          consumesInput.focus();
        },
      });
    }

    function createAutocomplete(config) {
      const {
        inputEl,
        panelEl,
        getKeyword,
        buildOptions,
        applySuggestion,
      } = config;
      let activeIndex = -1;
      let currentOptions = [];
      let waitTimer = 0;

      const hidePanel = () => {
        panelEl.classList.remove('show');
        panelEl.innerHTML = '';
        activeIndex = -1;
        currentOptions = [];
      };

      const renderWaiting = () => {
        panelEl.classList.add('show');
        panelEl.innerHTML = '<div class="autocomplete-waiting">联想中...</div>';
      };

      const renderOptions = (options) => {
        currentOptions = options;
        activeIndex = options.length ? 0 : -1;
        if (!options.length) {
          panelEl.classList.remove('show');
          panelEl.innerHTML = '';
          return;
        }
        panelEl.classList.add('show');
        panelEl.innerHTML = options
          .map((item, index) => `
            <button type="button" class="autocomplete-item${index === activeIndex ? ' active' : ''}" data-value="${escapeAttr(item)}">${escapeHtml(item)}</button>
          `)
          .join('');
        panelEl.querySelectorAll('.autocomplete-item').forEach((button, index) => {
          button.addEventListener('mousedown', (event) => {
            event.preventDefault();
            applySuggestion(options[index]);
            hidePanel();
          });
        });
      };

      const updateActiveVisual = () => {
        panelEl.querySelectorAll('.autocomplete-item').forEach((button, index) => {
          button.classList.toggle('active', index === activeIndex);
        });
      };

      const requestSuggestions = () => {
        const keyword = getKeyword();
        if (!keyword) {
          hidePanel();
          return;
        }
        renderWaiting();
        clearTimeout(waitTimer);
        waitTimer = window.setTimeout(() => {
          const options = buildOptions(keyword).slice(0, 10);
          renderOptions(options);
        }, 220);
      };

      inputEl.addEventListener('focus', requestSuggestions);
      inputEl.addEventListener('input', requestSuggestions);
      inputEl.addEventListener('blur', () => {
        window.setTimeout(hidePanel, 120);
      });
      inputEl.addEventListener('keydown', (event) => {
        if (!panelEl.classList.contains('show') || !currentOptions.length) return;
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          activeIndex = (activeIndex + 1) % currentOptions.length;
          updateActiveVisual();
          return;
        }
        if (event.key === 'ArrowUp') {
          event.preventDefault();
          activeIndex = (activeIndex - 1 + currentOptions.length) % currentOptions.length;
          updateActiveVisual();
          return;
        }
        if (event.key === 'Enter') {
          event.preventDefault();
          if (activeIndex >= 0 && activeIndex < currentOptions.length) {
            applySuggestion(currentOptions[activeIndex]);
            hidePanel();
          }
          return;
        }
        if (event.key === 'Escape') {
          hidePanel();
        }
      });
    }

    function getStepIdSuggestions(currentNodeId) {
      return state.nodes
        .filter((item) => item.type === 'step' && item.id !== currentNodeId)
        .map((item, index) => normalizeNodeKey(item, index + 1));
    }

    function getRuntimePathSuggestions(currentNode) {
      const basics = [
        '$input',
        '$context',
        '$variables',
        '$steps',
      ];
      const runtimePaths = [];

      state.nodes.forEach((item, index) => {
        const nodeKey = normalizeNodeKey(item, index + 1);
        const outputFields = item.outputs
          .split(',')
          .map((value) => value.trim())
          .filter(Boolean);
        if (item.type === 'context') {
          runtimePaths.push(`$context.${nodeKey}`);
          outputFields.forEach((field) => runtimePaths.push(`$context.${nodeKey}.${field}`));
        }
        if (item.type === 'variable') {
          runtimePaths.push(`$variables.${nodeKey}`);
        }
        if (item.type === 'step') {
          runtimePaths.push(`$steps.${nodeKey}`);
          outputFields.forEach((field) => runtimePaths.push(`$steps.${nodeKey}.${field}`));
        }
      });

      if (currentNode.type !== 'step') {
        basics.push('$steps.<step_id>.<output>');
      }
      return [...new Set([...basics, ...runtimePaths])];
    }

    function normalizeNodeKey(node, fallbackIndex) {
      const rawKey = (node.title || `${node.type}_${fallbackIndex}`).trim();
      return rawKey
        .replaceAll(/\s+/g, '_')
        .replaceAll(/[^a-zA-Z0-9_]/g, '_');
    }

    function toDslObject() {
      const context = {};
      const variables = {};
      const prechecks = [];
      const steps = [];
      let onFail = null;

      state.nodes.forEach((node, index) => {
        const key = node.title || `${node.type}_${index + 1}`;
        const outputs = node.outputs
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean);

        if (node.type === 'context') {
          context[key] = {
            type: 'sql',
            sql: node.sql,
            outputs,
          };
        }

        if (node.type === 'variable') {
          variables[key] = {
            assign_by_condition: {
              decision: node.decision,
              value: `TODO_${key}`,
            },
          };
        }

        if (node.type === 'precheck') {
          prechecks.push({
            id: key,
            type: 'sql',
            sql: node.sql,
            on_fail: {
              decision: node.decision,
              message: {
                zh: `${key} 未通过`,
                en: `${key} failed`,
              },
            },
            outputs,
          });
        }

        if (node.type === 'step') {
          steps.push({
            id: key,
            type: 'sql',
            sql: node.sql,
            consumes: node.consumes
              .split(',')
              .map((item) => item.trim())
              .filter(Boolean),
            outputs,
            _step_order: node.stepOrder || 0,
          });
        }

        if (node.type === 'on_fail') {
          onFail = {
            decision: node.decision,
            message: {
              zh: `${key} 命中失败条件`,
              en: `${key} failure condition matched`,
            },
          };
        }
      });

      const sortedSteps = steps
        .sort((left, right) => left._step_order - right._step_order)
        .map((item) => {
          const { _step_order, ...stepPayload } = item;
          return stepPayload;
        });

      return {
        context,
        variables,
        prechecks,
        steps: sortedSteps,
        on_fail: onFail || {
          decision: 'exists',
          message: { zh: '默认失败', en: 'default failure' },
        },
      };
    }

    function renderDslPreview() {
      const payload = toDslObject();
      dslPreview.textContent = JSON.stringify(payload, null, 2);
    }

    function openDslPreview() {
      renderDslPreview();
      if (typeof jsonPreviewDialog.showModal === 'function') {
        jsonPreviewDialog.showModal();
      } else {
        jsonPreviewDialog.setAttribute('open', 'open');
      }
    }

    function closeDslPreview() {
      if (typeof jsonPreviewDialog.close === 'function' && jsonPreviewDialog.hasAttribute('open')) {
        jsonPreviewDialog.close();
      } else {
        jsonPreviewDialog.removeAttribute('open');
      }
    }

    function fromDslObject(payload) {
      const nextNodes = [];
      let cursorX = 80;
      let cursorY = 80;
      const moveCursor = () => {
        cursorY += 140;
        if (cursorY > 980) {
          cursorX += 300;
          cursorY = 80;
        }
      };
      const pushNode = (nodeType, title, extra) => {
        nextNodes.push({
          id: makeNodeId(),
          type: nodeType,
          title: title || `${nodeType}_${nextNodes.length + 1}`,
          x: cursorX,
          y: cursorY,
          sql: extra.sql || 'SELECT 1 AS ok;',
          decision: extra.decision || 'exists',
          outputs: extra.outputs || '',
          consumes: extra.consumes || '',
          note: extra.note || '',
          stepOrder: Object.prototype.hasOwnProperty.call(extra, 'stepOrder')
            ? extra.stepOrder
            : (nodeType === 'step' ? nextNodes.filter((node) => node.type === 'step').length + 1 : null),
        });
        moveCursor();
      };

      const contextMap = payload.context || {};
      Object.entries(contextMap).forEach(([key, value]) => {
        pushNode('context', key, {
          sql: value.sql || '',
          outputs: Array.isArray(value.outputs) ? value.outputs.join(', ') : '',
        });
      });

      const variableMap = payload.variables || {};
      Object.entries(variableMap).forEach(([key, value]) => {
        const assign = value.assign_by_condition || {};
        pushNode('variable', key, {
          decision: assign.decision || 'exists',
        });
      });

      (payload.prechecks || []).forEach((item) => {
        pushNode('precheck', item.id || '', {
          sql: item.sql || '',
          decision: item.on_fail && item.on_fail.decision ? item.on_fail.decision : 'exists',
          outputs: Array.isArray(item.outputs) ? item.outputs.join(', ') : '',
        });
      });

      (payload.steps || []).forEach((item) => {
        pushNode('step', item.id || '', {
          sql: item.sql || '',
          outputs: Array.isArray(item.outputs) ? item.outputs.join(', ') : '',
          consumes: Array.isArray(item.consumes) ? item.consumes.join(', ') : '',
          stepOrder: nextNodes.filter((node) => node.type === 'step').length + 1,
        });
      });

      if (payload.on_fail) {
        pushNode('on_fail', 'on_fail', {
          decision: payload.on_fail.decision || 'exists',
        });
      }

      return nextNodes;
    }

    function saveLocal() {
      localStorage.setItem('execdsl_flow_designer_state_v1', JSON.stringify(state.nodes));
    }

    function normalizeStateNodes() {
      let stepCursor = 1;
      state.nodes = state.nodes.map((node) => {
        const normalized = {
          ...node,
          stepOrder: node.type === 'step' ? (Number.isFinite(node.stepOrder) ? node.stepOrder : stepCursor) : null,
        };
        if (node.type === 'step' && !Number.isFinite(node.stepOrder)) {
          stepCursor += 1;
        }
        return normalized;
      });
      const sortedSteps = getSortedSteps();
      sortedSteps.forEach((item, index) => {
        item.stepOrder = index + 1;
      });
    }

    function loadLocal() {
      const raw = localStorage.getItem('execdsl_flow_designer_state_v1');
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          state.nodes = parsed;
          normalizeStateNodes();
        }
      } catch (_error) {
        console.warn('加载本地缓存失败，已忽略。');
      }
    }

    function escapeHtml(value) {
      return (value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('\n', '&#10;');
    }

    dropZone.addEventListener('dragover', (event) => {
      event.preventDefault();
    });

    dropZone.addEventListener('drop', (event) => {
      event.preventDefault();
      const nodeType = event.dataTransfer.getData('node-type');
      const def = NODE_DEFS.find((item) => item.type === nodeType);
      if (!def) return;
      const rect = dropZone.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const node = makeNode(def, Math.max(12, x - 100), Math.max(12, y - 20));
      state.nodes.push(node);
      state.selectedId = node.id;
      renderCanvas();
      renderEditor();
      saveLocal();
      statusText.innerHTML = `<strong>已添加节点：</strong>${escapeHtml(def.label)}`;
    });

    window.addEventListener('mousemove', (event) => {
      if (!state.dragNodeId) return;
      const node = state.nodes.find((item) => item.id === state.dragNodeId);
      if (!node) return;
      const rect = dropZone.getBoundingClientRect();
      node.x = Math.max(8, event.clientX - rect.left - state.dragOffsetX);
      node.y = Math.max(8, event.clientY - rect.top - state.dragOffsetY);
      renderCanvas();
    });

    window.addEventListener('mouseup', () => {
      if (state.dragNodeId) {
        saveLocal();
      }
      state.dragNodeId = null;
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      state.nodes = [];
      state.selectedId = null;
      renderCanvas();
      renderEditor();
      saveLocal();
      statusText.textContent = '画布已清空。';
    });

    document.getElementById('btnArrange').addEventListener('click', () => {
      let x = 60;
      let y = 80;
      state.nodes.forEach((node, index) => {
        node.x = x;
        node.y = y;
        y += 140;
        if ((index + 1) % 7 === 0) {
          x += 280;
          y = 80;
        }
      });
      renderCanvas();
      saveLocal();
      statusText.textContent = '已自动排布。';
    });

    document.getElementById('btnImport').addEventListener('click', () => {
      document.getElementById('fileImportJson').click();
    });

    document.getElementById('fileImportJson').addEventListener('change', async (event) => {
      const target = event.target;
      const selectedFile = target.files && target.files[0] ? target.files[0] : null;
      target.value = '';
      if (!selectedFile) return;
      try {
        const rawText = await selectedFile.text();
        const payload = JSON.parse(rawText);
        state.nodes = fromDslObject(payload);
        state.selectedId = state.nodes.length ? state.nodes[0].id : null;
        renderCanvas();
        renderEditor();
        saveLocal();
        statusText.innerHTML = `<strong>导入成功：</strong>${escapeHtml(selectedFile.name)}`;
      } catch (_error) {
        statusText.classList.add('status-warn');
        statusText.innerHTML = '<strong>导入失败：</strong>JSON 格式不正确或结构无法解析。';
      }
    });

    document.getElementById('btnPreview').addEventListener('click', () => {
      openDslPreview();
      statusText.classList.remove('status-warn');
      statusText.textContent = '已打开 JSON 预览。';
    });

    document.getElementById('btnClosePreview').addEventListener('click', () => {
      closeDslPreview();
    });

    document.getElementById('btnExport').addEventListener('click', () => {
      const json = JSON.stringify(toDslObject(), null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'execdsl_flow_design.json';
      a.click();
      URL.revokeObjectURL(url);
      statusText.textContent = '已下载 DSL JSON。';
    });

    loadLocal();
    renderToolbox();
    renderCanvas();
    renderEditor();
    closeDslPreview();
  </script>
</body>
</html>
