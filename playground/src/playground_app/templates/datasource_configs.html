<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground 数据源配置</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f7fc;
      --panel: #ffffff;
      --surface-2: #f3f3fa;
      --line: #e6e0e9;
      --text: #1d1b20;
      --muted: #625b71;
      --accent: #6750a4;
      --accent-soft: #ece6f9;
      --on-accent: #ffffff;
      --danger: #b3261e;
      --danger-soft: #f9dedc;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 2px 8px rgba(103, 80, 164, 0.14);
    }

    body {
      margin: 0;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px 16px;
      display: grid;
      gap: 16px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .panel-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      border: 1px solid transparent;
      padding: 8px 12px;
      border-radius: 999px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease, background .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: .9; }
    .btn-primary { background: var(--accent); color: var(--on-accent); }
    .btn-primary:hover { box-shadow: 0 8px 16px rgba(103, 80, 164, 0.28); }
    .btn-muted { background: #ece6f0; color: #4a4458; }
    .btn-danger { background: var(--danger-soft); color: var(--danger); border-color: #f2b8b5; }
    .hint { font-size: 0.82rem; color: var(--muted); }
    #datasourceList {
      display: grid;
      gap: 10px;
    }
    .datasource-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 10px;
      display: grid;
      gap: 8px;
      background: #fcfcff;
    }
    .datasource-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 2fr) auto;
      gap: 8px;
      align-items: center;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 7px 9px;
      font: inherit;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      outline: none;
    }
    #status {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .page-link {
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
    }
    .material-symbols-rounded {
      font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 20;
      font-size: 18px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <div class="panel-head">
        <div>
          <h2 style="margin:0; font-size:1rem;">Playground 全局数据源配置</h2>
          <div class="hint">该页面配置会写入 SQLite，并被 Playground 运行 DSL 时全局共享。</div>
        </div>
        <a href="/" class="page-link"><span class="material-symbols-rounded">arrow_back</span>返回设计器</a>
      </div>
      <div class="panel-body">
        <div class="toolbar">
          <button type="button" class="btn-muted" id="btnReload"><span class="material-symbols-rounded">database</span>从 SQLite 载入</button>
          <button type="button" class="btn-primary" id="btnAdd"><span class="material-symbols-rounded">add_circle</span>新增数据源</button>
          <button type="button" class="btn-primary" id="btnSave"><span class="material-symbols-rounded">save</span>保存配置</button>
          <span class="hint">仅支持 PostgreSQL（postgresql:// 或 postgresql+psycopg2://）。</span>
        </div>
        <div id="datasourceList"></div>
        <div id="status">尚未加载。</div>
      </div>
    </section>
  </div>

  <script>
    const datasourceList = document.getElementById('datasourceList');
    const statusText = document.getElementById('status');

    function createDatasourceCard(data) {
      const card = document.createElement('div');
      card.className = 'datasource-card';
      card.innerHTML = `
        <div class="datasource-grid">
          <input data-role="name" placeholder="datasource 名称，例如 saas_db" />
          <input data-role="db_url" placeholder="postgresql+psycopg2://user:pass@host:5432/dbname" />
          <button class="btn-danger" type="button" data-role="remove"><span class="material-symbols-rounded">delete</span>删除</button>
        </div>
      `;
      card.querySelector('[data-role="name"]').value = data && data.name ? data.name : '';
      card.querySelector('[data-role="db_url"]').value = data && data.db_url ? data.db_url : '';
      card.querySelector('[data-role="remove"]').addEventListener('click', () => card.remove());
      return card;
    }

    function readDatasourceConfig() {
      return Array.from(datasourceList.children).map((card) => ({
        name: card.querySelector('[data-role="name"]').value.trim(),
        db_url: card.querySelector('[data-role="db_url"]').value.trim(),
      })).filter((item) => item.name || item.db_url);
    }

    function renderDatasourceCards(datasourceItems) {
      datasourceList.innerHTML = '';
      datasourceItems.forEach((item) => datasourceList.appendChild(createDatasourceCard(item)));
    }

    async function loadDatasourceConfigFromServer() {
      statusText.textContent = '正在从 SQLite 载入数据源配置...';
      try {
        const response = await fetch('/api/datasource-configs');
        const payload = await response.json();
        if (!response.ok) {
          statusText.textContent = `载入失败: ${payload.detail || payload.error || '未知错误'}`;
          return;
        }
        const datasources = Array.isArray(payload.datasources) ? payload.datasources : [];
        renderDatasourceCards(datasources);
        statusText.textContent = datasources.length
          ? `已载入 ${datasources.length} 个数据源。`
          : 'SQLite 中暂无数据源配置，请新增后保存。';
      } catch (error) {
        statusText.textContent = `载入失败: ${error.message || '网络错误'}`;
      }
    }

    async function saveDatasourceConfigToServer() {
      const datasourcePayload = readDatasourceConfig();
      if (!datasourcePayload.length) {
        statusText.textContent = '请至少配置一个数据源后再保存。';
        return;
      }
      statusText.textContent = '正在保存到 SQLite...';
      try {
        const response = await fetch('/api/datasource-configs', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ datasources: datasourcePayload }),
        });
        const payload = await response.json();
        if (!response.ok) {
          statusText.textContent = `保存失败: ${payload.detail || payload.error || '未知错误'}`;
          return;
        }
        renderDatasourceCards(Array.isArray(payload.datasources) ? payload.datasources : datasourcePayload);
        statusText.textContent = `已保存 ${payload.saved || datasourcePayload.length} 个数据源到 SQLite。`;
      } catch (error) {
        statusText.textContent = `保存失败: ${error.message || '网络错误'}`;
      }
    }

    document.getElementById('btnReload').addEventListener('click', () => {
      loadDatasourceConfigFromServer();
    });

    document.getElementById('btnSave').addEventListener('click', () => {
      saveDatasourceConfigToServer();
    });

    document.getElementById('btnAdd').addEventListener('click', () => {
      datasourceList.appendChild(createDatasourceCard({ name: '', db_url: '' }));
    });

    loadDatasourceConfigFromServer();
  </script>
</body>
</html>
