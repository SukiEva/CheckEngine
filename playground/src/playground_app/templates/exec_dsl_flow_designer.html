<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExecDSL 流程图式设计器（实验版）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" />
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --surface-2: #f7f9fc;
      --line: #d9e0e8;
      --text: #1f2937;
      --muted: #5f6b7a;
      --accent: #1e88e5;
      --accent-soft: #e3f2fd;
      --on-accent: #ffffff;
      --danger: #c62828;
      --danger-soft: #ffebee;
      --success: #0f9d58;
      --shadow: 0 2px 8px rgba(30, 136, 229, 0.12);
      --radius: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(240px, 280px) minmax(0, 1fr) minmax(320px, 380px);
      height: calc(100vh - 28px);
      gap: 14px;
      padding: 14px;
    }

    .panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    .panel-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .panel-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .panel-body {
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 0;
      overflow: auto;
    }

    .tool-item {
      border: 1px solid #d6e5f5;
      background: #f5f9ff;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .tool-item:active { cursor: pointer; }
    .tool-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(30, 136, 229, 0.18);
      border-color: #90caf9;
    }

    .tool-item strong {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .tool-item span {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .canvas-wrap {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: 0;
    }

    .canvas-toolbar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: var(--surface-2);
    }

    .el-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 10px;
      font-size: 0.84rem;
    }
    .el-button.is-circle {
      border-radius: 50%;
    }
    .el-button .material-symbols-rounded {
      font-size: 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      line-height: 1;
    }

    #canvas {
      position: relative;
      overflow: auto;
      min-height: 0;
      background: #f4f8fc;
    }

    #dropZone {
      display: grid;
      grid-template-columns: repeat(5, minmax(240px, 280px));
      gap: 12px;
      padding: 12px;
      align-items: start;
      min-width: 100%;
      width: max-content;
    }

    .flow-lane {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      min-height: 420px;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .flow-lane-head {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #eef4fb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .flow-lane-head strong {
      font-size: 0.85rem;
      color: #31506e;
    }
    .flow-lane-body {
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .lane-empty {
      color: var(--muted);
      font-size: 0.8rem;
      border: 1px dashed #d1d5db;
      border-radius: var(--radius-sm);
      padding: 10px;
      text-align: center;
      background: #fafafa;
    }

    .flow-node {
      position: relative;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      box-shadow: 0 4px 12px rgba(30, 136, 229, 0.14);
      cursor: pointer;
      transition: box-shadow .15s ease, border-color .15s ease;
    }

    .flow-node:hover { box-shadow: 0 10px 24px rgba(30, 136, 229, 0.2); }

    .flow-node.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .flow-node .node-head {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 0.82rem;
      display: flex;
      justify-content: space-between;
      color: #31506e;
      background: #eef4fb;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      font-weight: 700;
    }
    .flow-node .node-head span {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .flow-node .node-head span:first-child {
      flex: 1 1 auto;
      padding-right: 8px;
    }
    .flow-node .node-head span:last-child {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .flow-node .node-body {
      padding: 10px;
      display: grid;
      gap: 6px;
      font-size: 0.84rem;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .flow-node .node-body strong,
    .flow-node .node-body .muted,
    .step-sub-item {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .node-head-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .node-head-actions .el-button {
      width: 22px;
      min-width: 22px;
      height: 22px;
      min-height: 22px;
      padding: 0;
      line-height: 1;
      flex: 0 0 22px;
    }
    .node-head-actions .el-button .material-symbols-rounded {
      font-size: 14px;
    }
    .muted { color: var(--muted); }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .field input,
    .kv-row input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--el-border-color, #dcdfe6);
      border-radius: 8px;
      padding: 8px 11px;
      font: inherit;
      font-size: 0.84rem;
      resize: vertical;
      min-height: 38px;
      background: #fff;
      color: #303133;
    }

    .field textarea { min-height: 90px; line-height: 1.5; }
    .field input:focus,
    .kv-row input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: none;
      border-color: var(--el-color-primary, #409eff);
      box-shadow: 0 0 0 1px var(--el-color-primary-light-7, #a0cfff);
    }
    .field-note {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.5;
    }

    .field-autocomplete { position: relative; }
    .autocomplete-panel {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% - 4px);
      z-index: 12;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.12);
      padding: 8px;
      gap: 6px;
      max-height: 180px;
      overflow: auto;
    }
    .autocomplete-panel.show { display: grid; }
    .autocomplete-item {
      border: 1px solid #d6e5f5;
      background: #f5f9ff;
      color: #31506e;
      border-radius: 8px;
      text-align: left;
      padding: 6px 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: #e3f2fd;
      border-color: #90caf9;
    }
    .autocomplete-waiting {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 4px 2px;
    }

    pre {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.78rem;
      line-height: 1.5;
      max-height: 42vh;
      overflow: auto;
    }
    #dslPreview {
      background: #0b1020;
      border-radius: 10px;
      padding: 12px;
      margin: 0;
      overflow: auto;
    }
    #dslPreview code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.8rem;
      line-height: 1.45;
    }

    .material-symbols-rounded {
      font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 20;
      font-size: 18px;
      line-height: 1;
    }
    .status {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0 14px 12px;
    }

    .status strong { color: var(--success); }
    .status-warn strong { color: #b45309; }

    .tab-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 4px;
      border: 1px solid #e4e7ed;
      border-radius: 12px;
      background: #fff;
    }
    .tab-btn {
      justify-content: center;
      font-size: 0.8rem;
    }
    .tab-btn.is-active {
      border-color: var(--el-color-primary, #409eff);
      color: var(--el-color-primary, #409eff);
      background: var(--el-color-primary-light-9, #ecf5ff);
    }
    .tab-panel {
      display: none;
      gap: 10px;
      align-content: start;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }
    .tab-panel.active {
      display: grid;
    }
    .datasource-list {
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .datasource-list:empty::before {
      content: "暂无数据源配置，点击“+”开始配置。";
      color: var(--muted);
      font-size: 0.8rem;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      min-height: 96px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 8px;
      background: #fff;
    }
    .datasource-card {
      display: grid;
      gap: 6px;
    }
    .datasource-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
    }
    .inline-status {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .kv-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
      gap: 6px;
      margin-bottom: 6px;
    }
    .btn-loading {
      position: relative;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.9;
    }
    .btn-loading::after {
      content: "";
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-left: 4px;
    }
    .ep-dialog {
      width: min(920px, 92vw);
      border: 1px solid #e4e7ed;
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.16);
    }
    .ep-dialog::backdrop {
      background: rgba(17, 24, 39, 0.36);
    }
    .ep-dialog-wide {
      width: min(960px, 95vw);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1500px) {
      .app {
        grid-template-columns: 260px minmax(0, 1fr) 340px;
      }
    }

    @media (max-width: 1280px) {
      .app {
        grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
      }

      .app > aside:last-child {
        grid-column: 1 / -1;
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="panel-head">
        <h2 class="panel-title">运行配置</h2>
        <div class="panel-sub">在同一页面维护数据源配置和 input 参数配置。</div>
      </div>
      <div class="panel-body">
        <div class="tab-switch">
          <button type="button" class="el-button el-button--default is-plain tab-btn" data-tab-target="datasource">数据源配置</button>
          <button type="button" class="el-button el-button--default is-plain tab-btn active is-active" data-tab-target="input">输入参数</button>
        </div>
        <section class="tab-panel" data-tab-panel="datasource">
          <div class="field">
            <label>datasource（name/db_url）</label>
          </div>
          <div class="field-note">仅支持 PostgreSQL：<code>postgresql://</code> 或 <code>postgresql+psycopg2://</code>。</div>
          <div class="datasource-list" id="datasourceList"></div>
          <button type="button" class="el-button el-button--primary is-plain is-circle el-button--small" id="btnDsAdd" title="新增数据源" aria-label="新增数据源"><span class="material-symbols-rounded">add</span></button>
          <div class="inline-status" id="datasourceStatus">尚未加载数据源配置。</div>
        </section>
        <section class="tab-panel active" data-tab-panel="input">
          <div class="field">
            <label>input_data（key/value）</label>
            <div id="runtimeInputRows"></div>
            <button type="button" class="el-button el-button--primary is-plain is-circle el-button--small" id="btnAddInputParam" title="新增输入参数" aria-label="新增输入参数"><span class="material-symbols-rounded">add</span></button>
          </div>
          <div class="inline-status">运行 DSL 时将使用这里的 input_data；默认包含 <code>source_object_id</code>。</div>
        </section>
      </div>
    </aside>

    <main class="panel canvas-wrap">
      <div class="canvas-toolbar">
        <button class="el-button el-button--primary" id="btnReset"><span class="material-symbols-rounded">delete_sweep</span>清空画布</button>
        <button class="el-button el-button--default is-plain" id="btnImport"><span class="material-symbols-rounded">upload_file</span>导入 JSON</button>
        <button class="el-button el-button--default is-plain" id="btnPreview"><span class="material-symbols-rounded">visibility</span>预览 JSON</button>
        <button class="el-button el-button--success is-plain" id="btnRun"><span class="material-symbols-rounded">play_circle</span>运行 DSL</button>
        <button class="el-button el-button--default is-plain" id="btnExport"><span class="material-symbols-rounded">download</span>下载 JSON</button>
        <input type="file" id="fileImportJson" accept="application/json" style="display:none;" />
      </div>
      <section id="canvas">
        <div id="dropZone"></div>
      </section>
      <div class="status" id="statusText">提示：按执行阶段分栏展示，支持在 Precheck / Step 栏添加多个节点。</div>
    </main>

    <aside class="panel">
      <div class="panel-head">
        <h2 class="panel-title">节点编辑</h2>
        <div class="panel-sub">编辑仅针对当前选中的节点；可通过上方“预览 JSON”查看完整 DSL。</div>
      </div>
      <div class="panel-body" id="editorPanel">
        <div class="muted">请先在画布中选择一个节点。</div>
      </div>
    </aside>
  </div>

  <dialog id="jsonPreviewDialog" class="ep-dialog">
    <div style="padding:12px 14px; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center;">
      <strong style="font-size:0.95rem;">ExecDSL JSON 预览</strong>
      <button class="el-button el-button--default is-plain" id="btnClosePreview" style="padding:6px 10px;"><span class="material-symbols-rounded">close</span>关闭</button>
    </div>
    <div style="padding:12px;">
      <pre id="dslPreview" style="max-height:60vh;"><code id="dslPreviewCode" class="language-json"></code></pre>
    </div>
  </dialog>

  <dialog id="runtimeDialog" class="ep-dialog ep-dialog-wide">
    <div style="padding:12px 14px; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center;">
      <strong style="font-size:0.95rem;">DSL 运行结果</strong>
      <button class="el-button el-button--default is-plain" id="btnCloseRuntime" style="padding:6px 10px;"><span class="material-symbols-rounded">close</span>关闭</button>
    </div>
    <div style="padding:12px; display:grid; gap:12px;">
      <div id="runtimeStatus" style="font-size:0.82rem; color:#6b7280;">尚未执行。</div>
      <pre id="runtimeResult" style="max-height:38vh;">{}</pre>
    </div>
  </dialog>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script>
    const NODE_DEF_MAP = {
      context: { type: 'context', label: 'Context 节点', defaultTitle: '加载上下文' },
      variable: { type: 'variable', label: 'Variable 节点', defaultTitle: '计算变量' },
      precheck: { type: 'precheck', label: 'Precheck 节点', defaultTitle: '前置检查' },
      step: { type: 'step', label: 'Step 节点', defaultTitle: '执行步骤' },
      on_fail: { type: 'on_fail', label: 'On Fail 节点', defaultTitle: '最终失败判定' },
    };

    const dropZone = document.getElementById('dropZone');
    const editorPanel = document.getElementById('editorPanel');
    const dslPreviewCode = document.getElementById('dslPreviewCode');
    const jsonPreviewDialog = document.getElementById('jsonPreviewDialog');
    const runtimeDialog = document.getElementById('runtimeDialog');
    const runtimeInputRowsEl = document.getElementById('runtimeInputRows');
    const addInputParamButton = document.getElementById('btnAddInputParam');
    const runtimeStatus = document.getElementById('runtimeStatus');
    const runtimeResult = document.getElementById('runtimeResult');
    const statusText = document.getElementById('statusText');
    const runButton = document.getElementById('btnRun');
    const datasourceList = document.getElementById('datasourceList');
    const datasourceStatus = document.getElementById('datasourceStatus');
    const DATASOURCE_CONFIG_STORAGE_KEY = 'execdsl_flow_designer_datasource_v1';
    const INPUT_CONFIG_STORAGE_KEY = 'execdsl_flow_designer_input_v1';
    const DEFAULT_DATASOURCE_CONFIGS = [
      {
        name: 'saas_db',
        db_url: 'postgresql+psycopg2://user:password@127.0.0.1:5432/saas_db',
      },
      {
        name: 'data_db',
        db_url: 'postgresql+psycopg2://user:password@127.0.0.1:5432/data_db',
      },
    ];
    const DEFAULT_INPUT_ROWS = [{ key: 'source_object_id', value: 'DEMO_1' }];

    const state = {
      nodes: [],
      selectedId: null,
    };
    let datasourceNameOptions = [];
    let runtimeInputRows = [...DEFAULT_INPUT_ROWS];

    const FIXED_TYPES = new Set(['context', 'on_fail']);
    const SQL_NODE_TYPES = new Set(['context', 'precheck', 'step']);
    const DECISION_NODE_TYPES = new Set(['precheck', 'on_fail']);
    const OUTPUT_NODE_TYPES = new Set(['context', 'precheck', 'step']);

    function isSqlNode(nodeType) {
      return SQL_NODE_TYPES.has(nodeType);
    }

    function isDecisionNode(nodeType) {
      return DECISION_NODE_TYPES.has(nodeType);
    }

    function hasOutputs(nodeType) {
      return OUTPUT_NODE_TYPES.has(nodeType);
    }

    function getDefaultDecisionByNodeType(nodeType) {
      if (nodeType === 'on_fail') {
        return 'exists($steps.some_step.some_output)';
      }
      if (nodeType === 'precheck') {
        return 'exists';
      }
      return '';
    }

    function makeNode(def, x, y) {
      return {
        id: makeNodeId(),
        type: def.type,
        title: def.defaultTitle,
        x,
        y,
        sql: 'SELECT 1 AS ok;',
        sqlParamsText: '{}',
        sqlParams: [{ key: '', value: '' }],
        datasource: 'saas_db',
        resultMode: def.type === 'context' ? 'record' : 'records',
        decision: getDefaultDecisionByNodeType(def.type),
        variableWhenRows: [{ condition: '', value: '' }],
        variableValue: '',
        variableDefault: '',
        failMode: 'single',
        messageCn: '',
        messageEn: '',
        divider: '',
        dividerCn: '',
        dividerEn: '',
        outputs: 'ok',
        consumes: '',
        consumeRows: [{ stepName: '', alias: '' }],
        description: '',
        stepOrder: def.type === 'step' ? getNextStepOrder() : null
      };
    }

    function makeNodeId() {
      return `node_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`;
    }

    function renderCanvas() {
      dropZone.innerHTML = '';
      const lanes = [
        { type: 'context', label: '1) Context' },
        { type: 'variable', label: '2) Variables' },
        { type: 'precheck', label: '3) Prechecks' },
        { type: 'step', label: '4) Steps' },
        { type: 'on_fail', label: '5) On Fail' },
      ];

      lanes.forEach((lane) => {
        const laneHasFixedNode = FIXED_TYPES.has(lane.type) && state.nodes.some((item) => item.type === lane.type);
        const addButtonHtml = laneHasFixedNode
          ? ''
          : `<button class="el-button el-button--primary is-plain is-circle el-button--small" data-add-type="${lane.type}" type="button" title="新增 ${lane.type} 节点" aria-label="新增 ${lane.type} 节点"><span class="material-symbols-rounded">add</span></button>`;
        const laneEl = document.createElement('section');
        laneEl.className = 'flow-lane';
        laneEl.innerHTML = `
          <div class="flow-lane-head">
            <strong>${lane.label}</strong>
            ${addButtonHtml}
          </div>
          <div class="flow-lane-body" data-lane-body="${lane.type}"></div>
        `;
        const addBtn = laneEl.querySelector('[data-add-type]');
        if (addBtn) {
          addBtn.addEventListener('click', () => addNodeByType(lane.type));
        }
        dropZone.appendChild(laneEl);
      });

      const laneNodeMap = {
        context: state.nodes.filter((item) => item.type === 'context'),
        variable: state.nodes.filter((item) => item.type === 'variable'),
        precheck: state.nodes.filter((item) => item.type === 'precheck'),
        step: getSortedSteps(),
        on_fail: state.nodes.filter((item) => item.type === 'on_fail'),
      };

      Object.entries(laneNodeMap).forEach(([laneType, laneNodes]) => {
        const laneBody = dropZone.querySelector(`[data-lane-body="${laneType}"]`);
        if (!laneBody) return;
        if (!laneNodes.length) {
          laneBody.innerHTML = '<div class="lane-empty">暂无节点，点击“+ 添加”创建。</div>';
          return;
        }
        laneNodes.forEach((node, index) => {
          const nodeRank = node.type === 'step' ? `S${node.stepOrder || index + 1}` : `#${index + 1}`;
          const nodeTitle = (node.type === 'context' || node.type === 'on_fail')
            ? node.type
            : (node.title || '(未命名节点)');
          const el = document.createElement('article');
          el.className = `flow-node${state.selectedId === node.id ? ' selected' : ''}`;
          el.dataset.nodeId = node.id;
          el.innerHTML = `
            <div class="node-head">
              <span>${node.type}</span>
              <span class="node-head-actions">
                <span>${nodeRank}</span>
                ${(node.type === 'precheck' || node.type === 'step')
                  ? `<button class="el-button el-button--default is-plain is-circle el-button--small node-move-up-btn" type="button" data-node-move-up="${node.id}" title="上移节点" aria-label="上移节点"><span class="material-symbols-rounded">arrow_upward</span></button>
                     <button class="el-button el-button--default is-plain is-circle el-button--small node-move-down-btn" type="button" data-node-move-down="${node.id}" title="下移节点" aria-label="下移节点"><span class="material-symbols-rounded">arrow_downward</span></button>`
                  : ''}
                <button class="el-button el-button--danger is-plain is-circle el-button--small node-delete-btn" type="button" data-node-delete="${node.id}" title="删除节点" aria-label="删除节点"><span class="material-symbols-rounded">delete</span></button>
              </span>
            </div>
            <div class="node-body">
              <strong>${escapeHtml(nodeTitle)}</strong>
              ${(node.type === 'precheck' || node.type === 'step') && node.description
                ? `<div class="muted">description: ${escapeHtml(node.description)}</div>`
                : ''}
              <div class="muted">ds: ${escapeHtml(node.datasource || '-')} / mode: ${escapeHtml(node.resultMode || '-')}</div>
              <div class="muted">outputs: ${escapeHtml(node.outputs || '无')}</div>
            </div>
          `;
          el.addEventListener('click', () => selectNode(node.id));
          const deleteButton = el.querySelector('[data-node-delete]');
          if (deleteButton) {
            deleteButton.addEventListener('click', (event) => {
              event.stopPropagation();
              deleteNodeById(node.id);
            });
          }
          const moveUpButton = el.querySelector('[data-node-move-up]');
          if (moveUpButton) {
            moveUpButton.addEventListener('click', (event) => {
              event.stopPropagation();
              moveNodeInLane(node.id, -1);
            });
          }
          const moveDownButton = el.querySelector('[data-node-move-down]');
          if (moveDownButton) {
            moveDownButton.addEventListener('click', (event) => {
              event.stopPropagation();
              moveNodeInLane(node.id, 1);
            });
          }
          laneBody.appendChild(el);
        });
      });
    }

    function addNodeByType(nodeType) {
      const def = NODE_DEF_MAP[nodeType] || null;
      if (!def) return;
      if (FIXED_TYPES.has(nodeType) && state.nodes.some((item) => item.type === nodeType)) {
        statusText.classList.add('status-warn');
        statusText.innerHTML = `<strong>${escapeHtml(nodeType)}</strong> 顶层仅允许 1 个节点。`;
        return;
      }
      const node = makeNode(def, 0, 0);
      state.nodes.push(node);
      if (node.type === 'step') {
        applyStepVerticalLayout();
      }
      state.selectedId = node.id;
      renderCanvas();
      renderEditor();
      saveLocal();
      statusText.classList.remove('status-warn');
      statusText.innerHTML = `<strong>已添加节点：</strong>${escapeHtml(def.label)}`;
    }

    function selectNode(nodeId) {
      state.selectedId = nodeId;
      renderCanvas();
      renderEditor();
    }

    function renderEditor() {
      const node = state.nodes.find((item) => item.id === state.selectedId);
      if (!node) {
        editorPanel.innerHTML = '<div class="muted">请先在画布中选择一个节点。</div>';
        return;
      }

      const showNodeTitleField = !(node.type === 'context' || node.type === 'on_fail');
      const showDividerConfig = node.failMode === 'sub_repeat' || node.failMode === 'full_repeat';

      editorPanel.innerHTML = `
        ${showNodeTitleField ? `
        <div class="field">
          <label>节点标题</label>
          <input id="f_title" value="${escapeAttr(node.title)}" />
        </div>
        ` : ''}
        <div class="field">
          <label>类型（只读）</label>
          <input value="${node.type}" disabled />
        </div>
        ${isSqlNode(node.type) ? `
        <div class="field">
          <label>Datasource</label>
          <input
            id="f_datasource"
            list="datasourceOptions"
            value="${escapeAttr(node.datasource || '')}"
            placeholder="输入或选择已配置的数据源"
          />
          <datalist id="datasourceOptions">${renderDatasourceOptionsHtml()}</datalist>
        </div>
        <div class="field">
          <label>Result Mode</label>
          <select id="f_result_mode">
            <option value="record" ${(node.resultMode || '') === 'record' ? 'selected' : ''}>record</option>
            <option value="records" ${(node.resultMode || '') === 'records' ? 'selected' : ''}>records</option>
          </select>
        </div>
        <div class="field field-autocomplete">
          <label>SQL</label>
          <textarea id="f_sql" data-ref-autocomplete="true">${escapeHtml(node.sql)}</textarea>
          <div class="field-note">输入 <code>$</code> 可联想运行时变量路径（例如 <code>$steps.xx.yy</code>）。</div>
          <div class="autocomplete-panel" id="ac_sql"></div>
        </div>
        <div class="field">
          <label>SQL 变量（key/value）</label>
          <div id="f_sql_params_rows"></div>
          <button class="el-button el-button--primary is-plain is-circle el-button--small" id="btnAddSqlParam" type="button" title="新增 SQL 变量" aria-label="新增 SQL 变量"><span class="material-symbols-rounded">add</span></button>
        </div>
        ` : ''}
        ${isDecisionNode(node.type) ? `
        <div class="field">
          <label>Decision（用于 precheck/on_fail/variable）</label>
          <input id="f_decision" data-ref-autocomplete="true" value="${escapeAttr(node.decision || '')}" />
        </div>
        ` : ''}
        ${node.type === 'variable' ? `
        <div class="field">
          <label>When 条件与赋值（condition/value）</label>
          <div id="f_variable_when_rows"></div>
          <button class="el-button el-button--primary is-plain is-circle el-button--small" id="btnAddVariableWhen" type="button" title="新增 when 条件" aria-label="新增 when 条件"><span class="material-symbols-rounded">add</span></button>
        </div>
        <div class="field">
          <label>默认值（default）</label>
          <input id="f_variable_default" data-ref-autocomplete="true" value="${escapeAttr(node.variableDefault || '')}" placeholder="例如 500" />
        </div>
        ` : ''}
        ${node.type === 'precheck' || node.type === 'on_fail' ? `
        <div class="field">
          <label>Fail Mode</label>
          <select id="f_fail_mode">
            <option value="single" ${(node.failMode || '') === 'single' ? 'selected' : ''}>single</option>
            <option value="sub_repeat" ${(node.failMode || '') === 'sub_repeat' ? 'selected' : ''}>sub_repeat</option>
            <option value="full_repeat" ${(node.failMode || '') === 'full_repeat' ? 'selected' : ''}>full_repeat</option>
          </select>
        </div>
        <div class="field">
          <label>Message CN</label>
          <textarea id="f_message_cn" data-ref-autocomplete="true">${escapeHtml(node.messageCn || '')}</textarea>
        </div>
        <div class="field">
          <label>Message EN</label>
          <textarea id="f_message_en" data-ref-autocomplete="true">${escapeHtml(node.messageEn || '')}</textarea>
        </div>
        ${showDividerConfig ? `
        <div class="field">
          <label>Divider（通用）</label>
          <input id="f_divider" value="${escapeAttr(node.divider || '')}" />
        </div>
        <div class="field">
          <label>Divider CN（中文优先）</label>
          <input id="f_divider_cn" value="${escapeAttr(node.dividerCn || '')}" />
        </div>
        <div class="field">
          <label>Divider EN（英文优先）</label>
          <input id="f_divider_en" value="${escapeAttr(node.dividerEn || '')}" />
        </div>
        ` : ''}
        ` : ''}
        ${hasOutputs(node.type) ? `
        <div class="field">
          <label>Outputs（逗号分隔）</label>
          <input id="f_outputs" value="${escapeAttr(node.outputs)}" />
        </div>
        ` : ''}
        ${node.type === 'step' ? `
        <div class="field">
          <label>Consumes（step_name + alias）</label>
          <div id="f_consumes_rows"></div>
          <button class="el-button el-button--primary is-plain is-circle el-button--small" id="btnAddConsumeRow" type="button" title="新增 consume" aria-label="新增 consume"><span class="material-symbols-rounded">add</span></button>
          <div class="field-note">step_name 支持选择已有 step 名，也支持输入 <code>$</code> 触发运行时变量联想。</div>
          <datalist id="consumeStepOptions"></datalist>
        </div>
        ` : ''}
        ${node.type === 'precheck' || node.type === 'step' ? `
        <div class="field">
          <label>Description</label>
          <input id="f_description" value="${escapeAttr(node.description || '')}" placeholder="可选：用于 precheck/step 的说明" />
        </div>
        ` : ''}
      `;

      const persistEditorNode = () => {
        if (showNodeTitleField) {
          node.title = document.getElementById('f_title').value.trim();
        } else {
          node.title = node.type;
        }
        if (isDecisionNode(node.type)) {
          node.decision = document.getElementById('f_decision').value.trim();
        } else {
          node.decision = '';
        }
        if (node.type === 'variable') {
          node.variableWhenRows = readVariableWhenRows();
          node.variableDefault = document.getElementById('f_variable_default').value.trim();
        }
        if (isSqlNode(node.type)) {
          node.sql = document.getElementById('f_sql').value;
          node.sqlParams = readSqlParamRows();
          node.sqlParamsText = JSON.stringify(sqlParamsRowsToObject(node.sqlParams));
          node.datasource = document.getElementById('f_datasource').value.trim();
          node.resultMode = document.getElementById('f_result_mode').value;
        }
        if (node.type === 'precheck' || node.type === 'on_fail') {
          const previousFailMode = node.failMode;
          node.failMode = document.getElementById('f_fail_mode').value;
          node.messageCn = document.getElementById('f_message_cn').value;
          node.messageEn = document.getElementById('f_message_en').value;
          if (node.failMode === 'sub_repeat' || node.failMode === 'full_repeat') {
            node.divider = (document.getElementById('f_divider') || { value: '' }).value.trim();
            node.dividerCn = (document.getElementById('f_divider_cn') || { value: '' }).value.trim();
            node.dividerEn = (document.getElementById('f_divider_en') || { value: '' }).value.trim();
          } else {
            node.divider = '';
            node.dividerCn = '';
            node.dividerEn = '';
          }
          if (previousFailMode !== node.failMode) {
            renderEditor();
            return;
          }
        }
        if (hasOutputs(node.type)) {
          node.outputs = document.getElementById('f_outputs').value.trim();
        } else {
          node.outputs = '';
        }
        if (node.type === 'step') {
          node.consumeRows = readConsumeRows();
          node.consumes = formatConsumesTextFromRows(node.consumeRows);
        } else {
          node.consumeRows = [{ stepName: '', alias: '' }];
          node.consumes = '';
        }
        if (node.type === 'precheck' || node.type === 'step') {
          node.description = document.getElementById('f_description').value.trim();
        } else {
          node.description = '';
        }
        renderCanvas();
        saveLocal();
        statusText.classList.remove('status-warn');
        statusText.innerHTML = `<strong>已自动保存：</strong>${escapeHtml(node.title || node.id)}`;
      };

      if (isSqlNode(node.type)) {
        renderSqlParamRows(node, persistEditorNode);
      }
      if (node.type === 'step') {
        renderConsumeRows(node, persistEditorNode);
      }
      if (node.type === 'variable') {
        renderVariableWhenRows(node, persistEditorNode);
      }
      [
        'f_title',
        'f_decision',
        'f_variable_default',
        'f_sql',
        'f_datasource',
        'f_result_mode',
        'f_fail_mode',
        'f_message_cn',
        'f_message_en',
        'f_divider',
        'f_divider_cn',
        'f_divider_en',
        'f_outputs',
        'f_description',
      ].forEach((elementId) => {
        const input = document.getElementById(elementId);
        if (!input) return;
        input.addEventListener('change', persistEditorNode);
      });

      bindAutocompletes(node);
    }

    function renderDatasourceOptionsHtml() {
      if (!datasourceNameOptions.length) {
        return '';
      }
      return datasourceNameOptions
        .map((name) => `<option value="${escapeAttr(name)}"></option>`)
        .join('');
    }

    function deleteNodeById(nodeId) {
      state.nodes = state.nodes.filter((item) => item.id !== nodeId);
      applyStepVerticalLayout();
      if (state.selectedId === nodeId) {
        state.selectedId = null;
      }
      renderCanvas();
      renderEditor();
      saveLocal();
      statusText.classList.remove('status-warn');
      statusText.innerHTML = '已删除节点。';
    }

    function getNextStepOrder() {
      const stepOrders = state.nodes
        .filter((item) => item.type === 'step' && Number.isFinite(item.stepOrder))
        .map((item) => item.stepOrder);
      if (!stepOrders.length) return 1;
      return Math.max(...stepOrders) + 1;
    }

    function renderSqlParamRows(node, onChanged) {
      const rowsContainer = document.getElementById('f_sql_params_rows');
      const addButton = document.getElementById('btnAddSqlParam');
      if (!rowsContainer || !addButton) return;
      const rows = Array.isArray(node.sqlParams) && node.sqlParams.length ? node.sqlParams : [{ key: '', value: '' }];
      const drawRows = () => {
        rowsContainer.innerHTML = rows.map((row, index) => `
          <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:6px; margin-bottom:6px; align-items:center;">
            <input data-sql-key="${index}" value="${escapeAttr(row.key || '')}" placeholder="变量名，如 user_id" />
            <input data-sql-value="${index}" data-ref-autocomplete="true" value="${escapeAttr(row.value || '')}" placeholder="值，如 $input.user_id 或 100" />
            <button class="el-button el-button--danger is-plain is-circle el-button--small" type="button" data-sql-remove="${index}" title="删除 SQL 变量" aria-label="删除 SQL 变量"><span class="material-symbols-rounded">delete</span></button>
          </div>
        `).join('');
        rowsContainer.querySelectorAll('[data-sql-remove]').forEach((button) => {
          button.addEventListener('click', () => {
            const removeIndex = Number(button.getAttribute('data-sql-remove'));
            rows.splice(removeIndex, 1);
            if (!rows.length) rows.push({ key: '', value: '' });
            drawRows();
            if (typeof onChanged === 'function') onChanged();
          });
        });
        rowsContainer.querySelectorAll('[data-sql-key], [data-sql-value]').forEach((input) => {
          input.addEventListener('change', () => {
            if (typeof onChanged === 'function') onChanged();
          });
        });
        bindRuntimeAutocomplete(node);
      };
      drawRows();
      addButton.addEventListener('click', () => {
        rows.push({ key: '', value: '' });
        drawRows();
        if (typeof onChanged === 'function') onChanged();
      });
    }

    function renderVariableWhenRows(node, onChanged) {
      const rowsContainer = document.getElementById('f_variable_when_rows');
      const addButton = document.getElementById('btnAddVariableWhen');
      if (!rowsContainer || !addButton) return;
      const rows = Array.isArray(node.variableWhenRows) && node.variableWhenRows.length
        ? node.variableWhenRows
        : [{ condition: '', value: '' }];
      const drawRows = () => {
        rowsContainer.innerHTML = rows.map((row, index) => `
          <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:6px; margin-bottom:6px;">
            <input data-variable-condition="${index}" data-ref-autocomplete="true" value="${escapeAttr(row.condition || '')}" placeholder="条件，如 $input.amount > 1000" />
            <input data-variable-value="${index}" data-ref-autocomplete="true" value="${escapeAttr(row.value || '')}" placeholder="赋值，如 1000 或 \"PASS\"" />
            <button class="el-button el-button--danger is-plain is-circle el-button--small" type="button" data-variable-remove="${index}" title="删除 when 条件" aria-label="删除 when 条件"><span class="material-symbols-rounded">delete</span></button>
          </div>
        `).join('');
        rowsContainer.querySelectorAll('[data-variable-remove]').forEach((button) => {
          button.addEventListener('click', () => {
            const removeIndex = Number(button.getAttribute('data-variable-remove'));
            rows.splice(removeIndex, 1);
            if (!rows.length) rows.push({ condition: '', value: '' });
            drawRows();
            if (typeof onChanged === 'function') onChanged();
          });
        });
        rowsContainer.querySelectorAll('[data-variable-condition], [data-variable-value]').forEach((input) => {
          input.addEventListener('change', () => {
            if (typeof onChanged === 'function') onChanged();
          });
        });
        bindRuntimeAutocomplete(node);
      };
      drawRows();
      addButton.addEventListener('click', () => {
        rows.push({ condition: '', value: '' });
        drawRows();
      });
    }

    function renderConsumeRows(node, onChanged) {
      const rowsContainer = document.getElementById('f_consumes_rows');
      const addButton = document.getElementById('btnAddConsumeRow');
      const datalist = document.getElementById('consumeStepOptions');
      if (!rowsContainer || !addButton || !datalist) return;
      const rows = Array.isArray(node.consumeRows) && node.consumeRows.length
        ? node.consumeRows
        : consumesTextToRows(node.consumes || '');
      if (!rows.length) {
        rows.push({ stepName: '', alias: '' });
      }
      const renderStepOptions = () => {
        const stepIds = getStepIdSuggestions(node.id);
        datalist.innerHTML = stepIds
          .map((stepId) => `<option value="${escapeAttr(stepId)}"></option>`)
          .join('');
      };
      const drawRows = () => {
        renderStepOptions();
        rowsContainer.innerHTML = rows.map((row, index) => `
          <div style="display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto; gap:6px; margin-bottom:6px;">
            <input data-consume-step="${index}" data-ref-autocomplete="true" list="consumeStepOptions" value="${escapeAttr(row.stepName || '')}" placeholder="step_name 或 $steps.xxx" />
            <input data-consume-alias="${index}" value="${escapeAttr(row.alias || '')}" placeholder="alias（可选）" />
            <button class="el-button el-button--danger is-plain is-circle el-button--small" type="button" data-consume-remove="${index}" title="删除 consume" aria-label="删除 consume"><span class="material-symbols-rounded">delete</span></button>
          </div>
        `).join('');
        rowsContainer.querySelectorAll('[data-consume-remove]').forEach((button) => {
          button.addEventListener('click', () => {
            const removeIndex = Number(button.getAttribute('data-consume-remove'));
            rows.splice(removeIndex, 1);
            if (!rows.length) rows.push({ stepName: '', alias: '' });
            drawRows();
            if (typeof onChanged === 'function') onChanged();
          });
        });
        rowsContainer.querySelectorAll('[data-consume-step], [data-consume-alias]').forEach((input) => {
          input.addEventListener('change', () => {
            if (typeof onChanged === 'function') onChanged();
          });
        });
        bindRuntimeAutocomplete(node);
      };
      drawRows();
      addButton.addEventListener('click', () => {
        rows.push({ stepName: '', alias: '' });
        drawRows();
        if (typeof onChanged === 'function') onChanged();
      });
    }

    function readSqlParamRows() {
      const keyInputs = Array.from(document.querySelectorAll('[data-sql-key]'));
      const valueInputs = Array.from(document.querySelectorAll('[data-sql-value]'));
      return keyInputs.map((input, index) => ({
        key: input.value.trim(),
        value: valueInputs[index] ? valueInputs[index].value.trim() : '',
      }));
    }

    function readVariableWhenRows() {
      const rowsContainer = document.getElementById('f_variable_when_rows');
      if (!rowsContainer) return [];
      const conditions = Array.from(rowsContainer.querySelectorAll('[data-variable-condition]'));
      return conditions
        .map((conditionInput) => {
          const rowIndex = conditionInput.getAttribute('data-variable-condition');
          if (rowIndex === null) return null;
          const valueInput = rowsContainer.querySelector(`[data-variable-value="${rowIndex}"]`);
          if (!valueInput) return null;
          const condition = conditionInput.value.trim();
          const valueText = valueInput.value;
          if (!condition) return null;
          return {
            condition,
            value: parseInputValue(valueText),
          };
        })
        .filter(Boolean);
    }

    function readConsumeRows() {
      const stepInputs = Array.from(document.querySelectorAll('[data-consume-step]'));
      const aliasInputs = Array.from(document.querySelectorAll('[data-consume-alias]'));
      return stepInputs
        .map((input, index) => ({
          stepName: input.value.trim(),
          alias: aliasInputs[index] ? aliasInputs[index].value.trim() : '',
        }))
        .filter((row) => row.stepName || row.alias);
    }

    function sqlParamsRowsToObject(rows) {
      const result = {};
      rows.forEach((row) => {
        if (!row.key) return;
        result[row.key] = parseInputValue(row.value);
      });
      return result;
    }

    function objectToSqlParamsRows(rawObject) {
      if (!rawObject || typeof rawObject !== 'object' || Array.isArray(rawObject)) {
        return [{ key: '', value: '' }];
      }
      const entries = Object.entries(rawObject).map(([key, value]) => ({
        key,
        value: normalizeValueToInput(value),
      }));
      return entries.length ? entries : [{ key: '', value: '' }];
    }

    function normalizeInputRows(rows) {
      if (!Array.isArray(rows)) {
        return [...DEFAULT_INPUT_ROWS];
      }
      const normalized = rows
        .map((row) => ({
          key: row && typeof row.key === 'string' ? row.key.trim() : '',
          value: row && typeof row.value === 'string' ? row.value : normalizeValueToInput(row && Object.prototype.hasOwnProperty.call(row, 'value') ? row.value : ''),
        }));
      const hasSourceObjectId = normalized.some((row) => row.key === 'source_object_id');
      if (!hasSourceObjectId) {
        normalized.unshift({ key: 'source_object_id', value: 'DEMO_1' });
      }
      return normalized.length ? normalized : [...DEFAULT_INPUT_ROWS];
    }

    function renderRuntimeInputRows() {
      if (!runtimeInputRowsEl) return;
      runtimeInputRows = normalizeInputRows(runtimeInputRows);
      runtimeInputRowsEl.innerHTML = runtimeInputRows.map((row, index) => `
        <div class="kv-row">
          <input data-input-key="${index}" value="${escapeAttr(row.key || '')}" placeholder="参数名，如 source_object_id" />
          <input data-input-value="${index}" value="${escapeAttr(row.value || '')}" placeholder="参数值，如 DEMO_1、100 或 true" />
          <button class="el-button el-button--danger is-plain is-circle el-button--small" type="button" data-input-remove="${index}" title="删除输入参数" aria-label="删除输入参数"><span class="material-symbols-rounded">delete</span></button>
        </div>
      `).join('');
      runtimeInputRowsEl.querySelectorAll('[data-input-remove]').forEach((button) => {
        button.addEventListener('click', () => {
          const removeIndex = Number(button.getAttribute('data-input-remove'));
          runtimeInputRows.splice(removeIndex, 1);
          runtimeInputRows = normalizeInputRows(runtimeInputRows);
          renderRuntimeInputRows();
          saveInputConfigLocal();
          renderEditor();
        });
      });
      runtimeInputRowsEl.querySelectorAll('[data-input-key], [data-input-value]').forEach((inputEl) => {
        inputEl.addEventListener('change', () => {
          runtimeInputRows = readRuntimeInputRows();
          saveInputConfigLocal();
          renderEditor();
        });
      });
    }

    function readRuntimeInputRows() {
      if (!runtimeInputRowsEl) return normalizeInputRows(runtimeInputRows);
      const keyInputs = Array.from(runtimeInputRowsEl.querySelectorAll('[data-input-key]'));
      const valueInputs = Array.from(runtimeInputRowsEl.querySelectorAll('[data-input-value]'));
      const rows = keyInputs.map((keyInput, index) => ({
        key: keyInput.value.trim(),
        value: valueInputs[index] ? valueInputs[index].value : '',
      }));
      return normalizeInputRows(rows);
    }

    function readRuntimeInputPayload() {
      const rows = readRuntimeInputRows();
      const payload = {};
      rows.forEach((row) => {
        if (!row.key) return;
        payload[row.key] = parseInputValue(row.value);
      });
      return payload;
    }

    function saveInputConfigLocal() {
      const currentRows = readRuntimeInputRows();
      runtimeInputRows = currentRows;
      localStorage.setItem(INPUT_CONFIG_STORAGE_KEY, JSON.stringify(currentRows));
    }

    function loadInputConfigLocal() {
      const raw = localStorage.getItem(INPUT_CONFIG_STORAGE_KEY);
      if (!raw) {
        runtimeInputRows = normalizeInputRows(DEFAULT_INPUT_ROWS);
        localStorage.setItem(INPUT_CONFIG_STORAGE_KEY, JSON.stringify(runtimeInputRows));
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        const normalized = normalizeInputRows(parsed);
        runtimeInputRows = normalized;
        if (!Array.isArray(parsed) || parsed.length !== normalized.length) {
          localStorage.setItem(INPUT_CONFIG_STORAGE_KEY, JSON.stringify(normalized));
        }
      } catch (_error) {
        runtimeInputRows = normalizeInputRows(DEFAULT_INPUT_ROWS);
        localStorage.setItem(INPUT_CONFIG_STORAGE_KEY, JSON.stringify(runtimeInputRows));
      }
    }

    function getSortedSteps() {
      return state.nodes
        .filter((item) => item.type === 'step')
        .sort((left, right) => (left.stepOrder || 0) - (right.stepOrder || 0));
    }

    function moveStepOrder(nodeId, offset) {
      const steps = getSortedSteps();
      const currentIndex = steps.findIndex((item) => item.id === nodeId);
      if (currentIndex < 0) return;
      const targetIndex = currentIndex + offset;
      if (targetIndex < 0 || targetIndex >= steps.length) return;
      const currentStep = steps[currentIndex];
      const targetStep = steps[targetIndex];
      const temp = currentStep.stepOrder;
      currentStep.stepOrder = targetStep.stepOrder;
      targetStep.stepOrder = temp;
      applyStepVerticalLayout();
      renderCanvas();
      renderEditor();
      saveLocal();
      statusText.classList.remove('status-warn');
      statusText.innerHTML = `<strong>已调整 Step 顺序：</strong>${escapeHtml(currentStep.title || currentStep.id)}`;
    }

    function movePrecheckOrder(nodeId, offset) {
      const precheckIndexes = state.nodes
        .map((item, index) => ({ item, index }))
        .filter(({ item }) => item.type === 'precheck');
      const currentIndex = precheckIndexes.findIndex(({ item }) => item.id === nodeId);
      if (currentIndex < 0) return;
      const targetIndex = currentIndex + offset;
      if (targetIndex < 0 || targetIndex >= precheckIndexes.length) return;
      const sourceNodeIndex = precheckIndexes[currentIndex].index;
      const targetNodeIndex = precheckIndexes[targetIndex].index;
      const temp = state.nodes[sourceNodeIndex];
      state.nodes[sourceNodeIndex] = state.nodes[targetNodeIndex];
      state.nodes[targetNodeIndex] = temp;
      renderCanvas();
      renderEditor();
      saveLocal();
      statusText.classList.remove('status-warn');
      statusText.innerHTML = `<strong>已调整 Precheck 顺序：</strong>${escapeHtml(precheckIndexes[currentIndex].item.title || precheckIndexes[currentIndex].item.id)}`;
    }

    function moveNodeInLane(nodeId, offset) {
      const node = state.nodes.find((item) => item.id === nodeId);
      if (!node) return;
      if (node.type === 'step') {
        moveStepOrder(nodeId, offset);
        return;
      }
      if (node.type === 'precheck') {
        movePrecheckOrder(nodeId, offset);
      }
    }

    function applyStepVerticalLayout() {
      const steps = getSortedSteps();
      steps.forEach((stepNode, index) => {
        stepNode.stepOrder = index + 1;
      });
    }

    function bindAutocompletes(node) {
      const sqlTextarea = document.getElementById('f_sql');
      const sqlPanel = document.getElementById('ac_sql');

      if (sqlTextarea && sqlPanel) {
        createAutocomplete({
          inputEl: sqlTextarea,
          panelEl: sqlPanel,
          getKeyword: () => {
            const cursor = sqlTextarea.selectionStart || 0;
            const beforeCursor = sqlTextarea.value.slice(0, cursor);
            const matched = beforeCursor.match(/[$][a-zA-Z0-9_.]*$/);
            return matched ? matched[0] : '';
          },
          buildOptions: (keyword) => {
            const suggestionPool = getRuntimePathSuggestions(node);
            if (!keyword) return [];
            return suggestionPool.filter((item) => item.toLowerCase().includes(keyword.toLowerCase()));
          },
          applySuggestion: (value) => {
            const cursor = sqlTextarea.selectionStart || 0;
            const beforeCursor = sqlTextarea.value.slice(0, cursor);
            const afterCursor = sqlTextarea.value.slice(cursor);
            const matched = beforeCursor.match(/[$][a-zA-Z0-9_.]*$/);
            if (!matched) return;
            const start = cursor - matched[0].length;
            sqlTextarea.value = `${beforeCursor.slice(0, start)}${value}${afterCursor}`;
            const nextCursor = start + value.length;
            sqlTextarea.selectionStart = nextCursor;
            sqlTextarea.selectionEnd = nextCursor;
            sqlTextarea.focus();
          },
        });
      }

      bindRuntimeAutocomplete(node);
    }

    const runtimeAutocompleteEl = document.createElement('div');
    runtimeAutocompleteEl.className = 'autocomplete-panel';
    runtimeAutocompleteEl.style.position = 'fixed';
    runtimeAutocompleteEl.style.left = '0';
    runtimeAutocompleteEl.style.top = '0';
    runtimeAutocompleteEl.style.width = 'min(420px, 80vw)';
    runtimeAutocompleteEl.style.display = 'none';
    runtimeAutocompleteEl.style.zIndex = '60';
    document.body.appendChild(runtimeAutocompleteEl);
    const runtimeAutocompleteState = {
      target: null,
      matches: [],
      activeIndex: 0,
      range: null,
    };

    function getReferenceRange(target) {
      const start = target.selectionStart || 0;
      const end = target.selectionEnd || 0;
      if (start !== end) return null;
      const value = target.value || '';
      let tokenStart = start;
      while (tokenStart > 0 && /[\$.\w]/.test(value[tokenStart - 1])) {
        tokenStart -= 1;
      }
      let tokenEnd = start;
      while (tokenEnd < value.length && /[\$.\w]/.test(value[tokenEnd])) {
        tokenEnd += 1;
      }
      const token = value.slice(tokenStart, tokenEnd);
      if (!token.startsWith('$')) return null;
      return { start: tokenStart, end: tokenEnd, token };
    }

    function hideRuntimeAutocomplete() {
      runtimeAutocompleteState.target = null;
      runtimeAutocompleteState.matches = [];
      runtimeAutocompleteState.activeIndex = 0;
      runtimeAutocompleteState.range = null;
      runtimeAutocompleteEl.style.display = 'none';
      runtimeAutocompleteEl.innerHTML = '';
    }

    function renderRuntimeAutocomplete() {
      runtimeAutocompleteEl.innerHTML = runtimeAutocompleteState.matches
        .map((item, index) => `
          <button type="button" class="autocomplete-item${index === runtimeAutocompleteState.activeIndex ? ' active' : ''}" data-ac-index="${index}">
            ${escapeHtml(item)}
          </button>
        `)
        .join('');
      runtimeAutocompleteEl.style.display = runtimeAutocompleteState.matches.length ? 'grid' : 'none';
      runtimeAutocompleteEl.querySelectorAll('[data-ac-index]').forEach((button) => {
        button.addEventListener('mousedown', (event) => {
          event.preventDefault();
          const index = Number(button.getAttribute('data-ac-index'));
          applyRuntimeAutocomplete(index);
        });
      });
    }

    function applyRuntimeAutocomplete(index) {
      const match = runtimeAutocompleteState.matches[index];
      const target = runtimeAutocompleteState.target;
      const range = runtimeAutocompleteState.range;
      if (!match || !target || !range) {
        hideRuntimeAutocomplete();
        return;
      }
      const value = target.value || '';
      target.value = `${value.slice(0, range.start)}${match}${value.slice(range.end)}`;
      const nextCaret = range.start + match.length;
      target.focus();
      target.setSelectionRange(nextCaret, nextCaret);
      hideRuntimeAutocomplete();
    }

    function positionRuntimeAutocomplete(target) {
      const rect = target.getBoundingClientRect();
      runtimeAutocompleteEl.style.left = `${Math.max(12, rect.left)}px`;
      runtimeAutocompleteEl.style.top = `${Math.min(window.innerHeight - 20, rect.bottom + 8)}px`;
    }

    function bindRuntimeAutocomplete(currentNode) {
      const updateAutocomplete = (target) => {
        if (!(target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement)) {
          hideRuntimeAutocomplete();
          return;
        }
        if (target.dataset.refAutocomplete !== 'true') {
          hideRuntimeAutocomplete();
          return;
        }
        const range = getReferenceRange(target);
        if (!range) {
          hideRuntimeAutocomplete();
          return;
        }
        const token = range.token.toLowerCase();
        const matches = getRuntimePathSuggestions(currentNode)
          .filter((item) => item.toLowerCase().startsWith(token))
          .slice(0, 12);
        if (!matches.length) {
          hideRuntimeAutocomplete();
          return;
        }
        runtimeAutocompleteState.target = target;
        runtimeAutocompleteState.matches = matches;
        runtimeAutocompleteState.activeIndex = 0;
        runtimeAutocompleteState.range = range;
        positionRuntimeAutocomplete(target);
        renderRuntimeAutocomplete();
      };

      editorPanel.querySelectorAll('[data-ref-autocomplete="true"]').forEach((inputEl) => {
        if (inputEl.dataset.runtimeAcBound === 'true') {
          return;
        }
        inputEl.dataset.runtimeAcBound = 'true';
        inputEl.addEventListener('focus', () => updateAutocomplete(inputEl));
        inputEl.addEventListener('input', () => updateAutocomplete(inputEl));
        inputEl.addEventListener('click', () => updateAutocomplete(inputEl));
        inputEl.addEventListener('blur', () => {
          window.setTimeout(hideRuntimeAutocomplete, 120);
        });
        inputEl.addEventListener('keydown', (event) => {
          if (!runtimeAutocompleteState.matches.length || runtimeAutocompleteState.target !== inputEl) return;
          if (event.key === 'ArrowDown') {
            event.preventDefault();
            runtimeAutocompleteState.activeIndex = (runtimeAutocompleteState.activeIndex + 1) % runtimeAutocompleteState.matches.length;
            renderRuntimeAutocomplete();
            return;
          }
          if (event.key === 'ArrowUp') {
            event.preventDefault();
            runtimeAutocompleteState.activeIndex = (runtimeAutocompleteState.activeIndex - 1 + runtimeAutocompleteState.matches.length) % runtimeAutocompleteState.matches.length;
            renderRuntimeAutocomplete();
            return;
          }
          if (event.key === 'Enter') {
            event.preventDefault();
            applyRuntimeAutocomplete(runtimeAutocompleteState.activeIndex);
            return;
          }
          if (event.key === 'Escape') {
            hideRuntimeAutocomplete();
          }
        });
      });
    }

    function createAutocomplete(config) {
      const {
        inputEl,
        panelEl,
        getKeyword,
        buildOptions,
        applySuggestion,
      } = config;
      let activeIndex = -1;
      let currentOptions = [];
      let waitTimer = 0;

      const hidePanel = () => {
        panelEl.classList.remove('show');
        panelEl.innerHTML = '';
        activeIndex = -1;
        currentOptions = [];
      };

      const renderWaiting = () => {
        panelEl.classList.add('show');
        panelEl.innerHTML = '<div class="autocomplete-waiting">联想中...</div>';
      };

      const renderOptions = (options) => {
        currentOptions = options;
        activeIndex = options.length ? 0 : -1;
        if (!options.length) {
          panelEl.classList.remove('show');
          panelEl.innerHTML = '';
          return;
        }
        panelEl.classList.add('show');
        panelEl.innerHTML = options
          .map((item, index) => `
            <button type="button" class="autocomplete-item${index === activeIndex ? ' active' : ''}" data-value="${escapeAttr(item)}">${escapeHtml(item)}</button>
          `)
          .join('');
        panelEl.querySelectorAll('.autocomplete-item').forEach((button, index) => {
          button.addEventListener('mousedown', (event) => {
            event.preventDefault();
            applySuggestion(options[index]);
            hidePanel();
          });
        });
      };

      const updateActiveVisual = () => {
        panelEl.querySelectorAll('.autocomplete-item').forEach((button, index) => {
          button.classList.toggle('active', index === activeIndex);
        });
      };

      const requestSuggestions = () => {
        const keyword = getKeyword();
        if (!keyword) {
          hidePanel();
          return;
        }
        renderWaiting();
        clearTimeout(waitTimer);
        waitTimer = window.setTimeout(() => {
          const options = buildOptions(keyword).slice(0, 10);
          renderOptions(options);
        }, 220);
      };

      inputEl.addEventListener('focus', requestSuggestions);
      inputEl.addEventListener('input', requestSuggestions);
      inputEl.addEventListener('blur', () => {
        window.setTimeout(hidePanel, 120);
      });
      inputEl.addEventListener('keydown', (event) => {
        if (!panelEl.classList.contains('show') || !currentOptions.length) return;
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          activeIndex = (activeIndex + 1) % currentOptions.length;
          updateActiveVisual();
          return;
        }
        if (event.key === 'ArrowUp') {
          event.preventDefault();
          activeIndex = (activeIndex - 1 + currentOptions.length) % currentOptions.length;
          updateActiveVisual();
          return;
        }
        if (event.key === 'Enter') {
          event.preventDefault();
          if (activeIndex >= 0 && activeIndex < currentOptions.length) {
            applySuggestion(currentOptions[activeIndex]);
            hidePanel();
          }
          return;
        }
        if (event.key === 'Escape') {
          hidePanel();
        }
      });
    }

    function getStepIdSuggestions(currentNodeId) {
      return state.nodes
        .filter((item) => item.type === 'step' && item.id !== currentNodeId)
        .map((item, index) => normalizeNodeKey(item, index + 1));
    }

    function getRuntimePathSuggestions(currentNode) {
      const basics = [
        '$input',
        '$context',
        '$variables',
        '$steps',
      ];
      const inputPayload = readRuntimeInputPayload();
      Object.keys(inputPayload).forEach((key) => {
        basics.push(`$input.${key}`);
      });
      if (!Object.prototype.hasOwnProperty.call(inputPayload, 'source_object_id')) {
        basics.push('$input.source_object_id');
      }
      const runtimePaths = [];

      state.nodes.forEach((item, index) => {
        const nodeKey = normalizeNodeKey(item, index + 1);
        const outputFields = (item.outputs || '')
          .split(',')
          .map((value) => value.trim())
          .filter(Boolean);
        if (item.type === 'context') {
          runtimePaths.push(`$context.${nodeKey}`);
          outputFields.forEach((field) => runtimePaths.push(`$context.${nodeKey}.${field}`));
        }
        if (item.type === 'variable') {
          runtimePaths.push(`$variables.${nodeKey}`);
        }
        if (item.type === 'step') {
          runtimePaths.push(`$steps.${nodeKey}`);
          outputFields.forEach((field) => runtimePaths.push(`$steps.${nodeKey}.${field}`));
        }
      });

      if (currentNode.type !== 'step') {
        basics.push('$steps.<step_id>.<output>');
      }
      return [...new Set([...basics, ...runtimePaths])];
    }

    function normalizeNodeKey(node, fallbackIndex) {
      const rawKey = (node.title || `${node.type}_${fallbackIndex}`).trim();
      return rawKey
        .replaceAll(/\s+/g, '_')
        .replaceAll(/[^a-zA-Z0-9_]/g, '_');
    }

    function buildDividerPayload(node) {
      if (!node || (node.failMode !== 'sub_repeat' && node.failMode !== 'full_repeat')) {
        return {};
      }
      const payload = {};
      if (node.divider) {
        payload.divider = node.divider;
      }
      if (node.dividerCn) {
        payload.divider_cn = node.dividerCn;
      }
      if (node.dividerEn) {
        payload.divider_en = node.dividerEn;
      }
      return payload;
    }

    function toDslObject() {
      let context = null;
      const variables = {};
      const prechecks = [];
      const steps = [];
      let onFail = null;

      state.nodes.forEach((node, index) => {
        const key = normalizeNodeKey(node, index + 1);
        const outputs = node.outputs
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean);
        const sqlParams = Array.isArray(node.sqlParams)
          ? sqlParamsRowsToObject(node.sqlParams)
          : parseJsonObjectOrEmpty(node.sqlParamsText || '{}');

        if (node.type === 'context') {
          context = {
            type: 'sql',
            datasource: node.datasource || 'saas_db',
            result_mode: node.resultMode || 'record',
            sql_template: node.sql,
            sql_params: sqlParams,
            outputs,
          };
        }

        if (node.type === 'variable') {
          const variableDefault = parseInputValue(node.variableDefault);
          variables[key] = {
            when: Array.isArray(node.variableWhenRows) ? node.variableWhenRows : [],
            default: variableDefault,
          };
        }

        if (node.type === 'precheck') {
          prechecks.push({
            name: key,
            ...(node.description ? { description: node.description } : {}),
            type: 'sql',
            datasource: node.datasource || 'saas_db',
            result_mode: node.resultMode || 'records',
            sql_template: node.sql,
            sql_params: sqlParams,
            on_fail: {
              decision: node.decision || 'exists',
              mode: node.failMode || 'single',
              message_cn: node.messageCn || `${key} 未通过`,
              message_en: node.messageEn || `${key} failed`,
              ...buildDividerPayload(node),
            },
            outputs,
          });
        }

        if (node.type === 'step') {
          steps.push({
            name: key,
            ...(node.description ? { description: node.description } : {}),
            type: 'sql',
            datasource: node.datasource || 'saas_db',
            result_mode: node.resultMode || 'records',
            sql_template: node.sql,
            sql_params: sqlParams,
            consumes: parseConsumesRows(node.consumeRows),
            outputs,
            _step_order: node.stepOrder || 0,
          });
        }

        if (node.type === 'on_fail') {
          onFail = {
            decision: node.decision || 'exists($steps.some_step.some_output)',
            mode: node.failMode || 'single',
            message_cn: node.messageCn || `${key} 命中失败条件`,
            message_en: node.messageEn || `${key} failure condition matched`,
            ...buildDividerPayload(node),
          };
        }
      });

      const sortedSteps = steps
        .sort((left, right) => left._step_order - right._step_order)
        .map((item) => {
          const { _step_order, ...stepPayload } = item;
          return stepPayload;
        });

      const result = {};
      if (context) {
        result.context = context;
      }
      result.variables = variables;
      result.prechecks = prechecks;
      result.steps = sortedSteps;
      result.on_fail = onFail || {
        decision: 'exists($steps.some_step.some_output)',
        mode: 'single',
        message_cn: '默认失败',
        message_en: 'default failure',
      };
      return result;
    }

    function renderDslPreview() {
      const payload = toDslObject();
      const jsonText = JSON.stringify(payload, null, 2);
      if (!dslPreviewCode) return;
      dslPreviewCode.textContent = jsonText;
      if (window.hljs && typeof window.hljs.highlightElement === 'function') {
        window.hljs.highlightElement(dslPreviewCode);
      }
    }

    function openDslPreview() {
      renderDslPreview();
      if (typeof jsonPreviewDialog.showModal === 'function') {
        jsonPreviewDialog.showModal();
      } else {
        jsonPreviewDialog.setAttribute('open', 'open');
      }
    }

    function closeDslPreview() {
      if (typeof jsonPreviewDialog.close === 'function' && jsonPreviewDialog.hasAttribute('open')) {
        jsonPreviewDialog.close();
      } else {
        jsonPreviewDialog.removeAttribute('open');
      }
    }

    function fromDslObject(payload) {
      const normalizedPayload = normalizeDslPayload(payload);
      validateDslPayload(normalizedPayload);
      const nextNodes = [];
      const pushNode = (nodeType, title, extra) => {
        nextNodes.push({
          id: makeNodeId(),
          type: nodeType,
          title: title || `${nodeType}_${nextNodes.length + 1}`,
          x: 0,
          y: 0,
          sql: extra.sql || 'SELECT 1 AS ok;',
          sqlParamsText: extra.sqlParamsText || '{}',
          sqlParams: Array.isArray(extra.sqlParams) ? extra.sqlParams : objectToSqlParamsRows(parseJsonObjectOrEmpty(extra.sqlParamsText || '{}')),
          datasource: extra.datasource || 'saas_db',
          resultMode: extra.resultMode || (nodeType === 'context' ? 'record' : 'records'),
          decision: typeof extra.decision === 'string' ? extra.decision : getDefaultDecisionByNodeType(nodeType),
          variableWhenRows: Array.isArray(extra.variableWhenRows) ? extra.variableWhenRows : [{ condition: '', value: '' }],
          variableValue: extra.variableValue || '',
          variableDefault: extra.variableDefault || '',
          failMode: extra.failMode || 'single',
          messageCn: extra.messageCn || '',
          messageEn: extra.messageEn || '',
          divider: extra.divider || '',
          dividerCn: extra.dividerCn || '',
          dividerEn: extra.dividerEn || '',
          outputs: extra.outputs || '',
          consumes: extra.consumes || '',
          consumeRows: Array.isArray(extra.consumeRows) ? extra.consumeRows : consumesTextToRows(extra.consumes || ''),
          description: extra.description || '',
          stepOrder: Object.prototype.hasOwnProperty.call(extra, 'stepOrder')
            ? extra.stepOrder
            : (nodeType === 'step' ? nextNodes.filter((node) => node.type === 'step').length + 1 : null),
        });
      };

      const contextValue = normalizedPayload.context || null;
      if (contextValue) {
        pushNode('context', 'context', {
          sql: contextValue.sql_template || '',
          outputs: Array.isArray(contextValue.outputs) ? contextValue.outputs.join(', ') : '',
          datasource: contextValue.datasource || 'saas_db',
          resultMode: contextValue.result_mode || 'record',
          sqlParamsText: JSON.stringify(contextValue.sql_params || {}, null, 2),
          sqlParams: objectToSqlParamsRows(contextValue.sql_params || {}),
        });
      }

      const variableMap = normalizedPayload.variables || {};
      Object.entries(variableMap).forEach(([key, value]) => {
        const whenItems = Array.isArray(value.when) ? value.when : [];
        const variableDefault = normalizeValueToInput(value.default);
        pushNode('variable', key, {
          variableWhenRows: whenItems.length
            ? whenItems.map((whenItem) => ({
              condition: normalizeValueToInput(whenItem.condition),
              value: normalizeValueToInput(whenItem.value),
            }))
            : [{ condition: '', value: '' }],
          variableDefault,
        });
      });

      (normalizedPayload.prechecks || []).forEach((item) => {
        pushNode('precheck', item.name || '', {
          sql: item.sql_template || '',
          decision: item.on_fail && item.on_fail.decision ? item.on_fail.decision : 'exists',
          failMode: item.on_fail && item.on_fail.mode ? item.on_fail.mode : 'single',
          messageCn: item.on_fail && item.on_fail.message_cn ? item.on_fail.message_cn : '',
          messageEn: item.on_fail && item.on_fail.message_en ? item.on_fail.message_en : '',
          divider: item.on_fail && item.on_fail.divider ? item.on_fail.divider : '',
          dividerCn: item.on_fail && item.on_fail.divider_cn ? item.on_fail.divider_cn : '',
          dividerEn: item.on_fail && item.on_fail.divider_en ? item.on_fail.divider_en : '',
          datasource: item.datasource || 'saas_db',
          resultMode: item.result_mode || 'records',
          sqlParamsText: JSON.stringify(item.sql_params || {}, null, 2),
          sqlParams: objectToSqlParamsRows(item.sql_params || {}),
          outputs: Array.isArray(item.outputs) ? item.outputs.join(', ') : '',
          description: item.description || '',
        });
      });

      (normalizedPayload.steps || []).forEach((item) => {
        pushNode('step', item.name || '', {
          sql: item.sql_template || '',
          outputs: Array.isArray(item.outputs) ? item.outputs.join(', ') : '',
          consumes: formatConsumesText(item.consumes),
          datasource: item.datasource || 'saas_db',
          resultMode: item.result_mode || 'records',
          sqlParamsText: JSON.stringify(item.sql_params || {}, null, 2),
          sqlParams: objectToSqlParamsRows(item.sql_params || {}),
          stepOrder: nextNodes.filter((node) => node.type === 'step').length + 1,
          consumeRows: normalizeConsumes(item.consumes).map((consume) => ({
            stepName: (consume.from || '').replace(/^\$steps\./, ''),
            alias: consume.alias || '',
          })),
          description: item.description || '',
        });
      });

      if (normalizedPayload.on_fail) {
        pushNode('on_fail', 'on_fail', {
          decision: normalizedPayload.on_fail.decision || 'exists($steps.some_step.some_output)',
          failMode: normalizedPayload.on_fail.mode || 'single',
          messageCn: normalizedPayload.on_fail.message_cn || '',
          messageEn: normalizedPayload.on_fail.message_en || '',
          divider: normalizedPayload.on_fail.divider || '',
          dividerCn: normalizedPayload.on_fail.divider_cn || '',
          dividerEn: normalizedPayload.on_fail.divider_en || '',
        });
      }

      const stepNodes = nextNodes
        .filter((item) => item.type === 'step')
        .sort((left, right) => (left.stepOrder || 0) - (right.stepOrder || 0));
      stepNodes.forEach((stepNode, index) => {
        stepNode.stepOrder = index + 1;
      });
      return nextNodes;
    }

    function updateDatasourceOptions(datasourceConfigs) {
      if (!Array.isArray(datasourceConfigs)) {
        datasourceNameOptions = [];
        return;
      }
      datasourceNameOptions = datasourceConfigs
        .map((item) => (item && typeof item.name === 'string' ? item.name.trim() : ''))
        .filter((name) => name.length > 0);
    }

    function createDatasourceCard(data) {
      const card = document.createElement('div');
      card.className = 'datasource-card';
      card.innerHTML = `
        <div class="kv-row">
          <input data-role="name" placeholder="datasource 名称，例如 saas_db" />
          <input data-role="db_url" placeholder="postgresql+psycopg2://user:pass@host:5432/dbname" />
          <button class="el-button el-button--danger is-plain is-circle el-button--small" type="button" data-role="remove" title="删除数据源" aria-label="删除数据源"><span class="material-symbols-rounded">delete</span></button>
        </div>
      `;
      card.querySelector('[data-role="name"]').value = data && data.name ? data.name : '';
      card.querySelector('[data-role="db_url"]').value = data && data.db_url ? data.db_url : '';
      card.querySelector('[data-role="remove"]').addEventListener('click', () => {
        card.remove();
        saveDatasourceConfigLocal();
      });
      card.querySelectorAll('[data-role="name"], [data-role="db_url"]').forEach((input) => {
        input.addEventListener('change', () => {
          saveDatasourceConfigLocal();
          renderEditor();
        });
      });
      return card;
    }

    function readDatasourceConfigRows() {
      return Array.from(datasourceList.children)
        .map((card) => ({
          name: card.querySelector('[data-role="name"]').value.trim(),
          db_url: card.querySelector('[data-role="db_url"]').value.trim(),
        }))
        .filter((item) => item.name || item.db_url);
    }

    function renderDatasourceCards(datasourceItems) {
      datasourceList.innerHTML = '';
      datasourceItems.forEach((item) => datasourceList.appendChild(createDatasourceCard(item)));
      updateDatasourceOptions(datasourceItems);
    }

    function normalizeDatasourceConfigs(rawDatasourceConfigs) {
      if (!Array.isArray(rawDatasourceConfigs)) {
        return [];
      }
      return rawDatasourceConfigs
        .map((item) => {
          if (!item || typeof item !== 'object' || Array.isArray(item)) {
            return null;
          }
          const name = typeof item.name === 'string' ? item.name.trim() : '';
          const dbUrl = typeof item.db_url === 'string' ? item.db_url.trim() : '';
          if (!name && !dbUrl) {
            return null;
          }
          return { name, db_url: dbUrl };
        })
        .filter(Boolean);
    }

    function loadDatasourceConfigLocal() {
      datasourceStatus.textContent = '正在载入本地数据源配置...';
      try {
        const rawLocalValue = localStorage.getItem(DATASOURCE_CONFIG_STORAGE_KEY);
        if (!rawLocalValue) {
          renderDatasourceCards(DEFAULT_DATASOURCE_CONFIGS);
          localStorage.setItem(DATASOURCE_CONFIG_STORAGE_KEY, JSON.stringify(DEFAULT_DATASOURCE_CONFIGS));
          datasourceStatus.textContent = `未找到本地配置，已初始化默认 ${DEFAULT_DATASOURCE_CONFIGS.length} 个数据源。`;
          renderEditor();
          return;
        }
        const parsed = JSON.parse(rawLocalValue);
        const datasourceConfigs = normalizeDatasourceConfigs(parsed);
        if (!datasourceConfigs.length) {
          renderDatasourceCards(DEFAULT_DATASOURCE_CONFIGS);
          localStorage.setItem(DATASOURCE_CONFIG_STORAGE_KEY, JSON.stringify(DEFAULT_DATASOURCE_CONFIGS));
          datasourceStatus.textContent = `本地配置为空，已恢复默认 ${DEFAULT_DATASOURCE_CONFIGS.length} 个数据源。`;
          renderEditor();
          return;
        }
        renderDatasourceCards(datasourceConfigs);
